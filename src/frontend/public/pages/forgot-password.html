<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <a href="/" class="navbar-brand" style="justify-content:center;font-size:1.8rem;">
                    <i class="fas fa-shopping-bag"></i> Vipo
                </a>
            </div>
            <h2>Quên mật khẩu</h2>
            <p class="subtitle">Vui lòng nhập email của bạn để nhận mã xác thực.</p>

            <form id="forgot-password-form" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email đã đăng ký</label>
                    <input type="email" class="form-control" id="email" placeholder="Nhập email của bạn..." required>
                </div>
                
                <div id="error-msg" style="color:var(--danger);font-size:0.85rem;margin-bottom:1rem;display:none;"></div>
                
                <!-- Mock Email Alert for Demo purposes -->
                <div id="demo-alert" style="display:none; background:rgba(99, 102, 241, 0.1); border:1px solid var(--primary); padding:1rem; border-radius:8px; margin-bottom:1rem; text-align:center;">
                    <p style="color:var(--primary-light);font-size:0.9rem;margin-bottom:0.5rem;"><i class="fas fa-info-circle"></i> Bản Demo: Email không được gửi thực tế.</p>
                    <p style="color:var(--white);font-weight:bold;font-size:1.1rem;">Mã OTP của bạn là: <span id="mock-otp-display" style="color:var(--warning);letter-spacing:2px;"></span></p>
                    <button type="button" class="btn btn-outline" style="margin-top:0.8rem; width:100%; padding:8px;" onclick="goToResetPassword()">Tiếp tục đặt lại mật khẩu</button>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;" id="submit-btn">
                    <i class="fas fa-paper-plane"></i> Gửi yêu cầu
                </button>
            </form>

            <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--dark-400);">
                Nhớ mật khẩu? <a href="/pages/login.html" style="color:var(--primary-light);font-weight:600;">Đăng nhập</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        let submittedEmail = '';

        async function handleForgotPassword(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            const demoAlert = document.getElementById('demo-alert');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            errorMsg.style.display = 'none';
            demoAlert.style.display = 'none';

            submittedEmail = document.getElementById('email').value;

            const result = await api.post('/auth/forgot-password', {
                email: submittedEmail
            });

            if (result.success) {
                // Show mock OTP alert
                document.getElementById('mock-otp-display').textContent = result.data.mockOtp;
                demoAlert.style.display = 'block';
                btn.style.display = 'none';
                document.getElementById('email').disabled = true;
                showToast('Yêu cầu thành công!', 'success');
            } else {
                errorMsg.textContent = result.message || 'Có lỗi xảy ra';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Gửi yêu cầu';
            }
        }

        function goToResetPassword() {
            // Encode email so we can pre-fill it on the next page
            window.location.href = '/pages/reset-password.html?email=' + encodeURIComponent(submittedEmail);
        }
    </script>
</body>
</html>
