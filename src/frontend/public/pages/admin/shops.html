<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gian hàng - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar"><div class="navbar-container"><a href="/" class="navbar-brand"><i class="fas fa-shopping-bag"></i> Vipo</a><div class="navbar-actions" id="nav-actions"></div></div></nav>
    <div class="dashboard-layout" style="padding:90px 2rem 2rem;">
        <aside class="sidebar glass">
            <div style="text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--dark-700);">
                <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1.5rem;"><i class="fas fa-crown"></i></div>
                <h4 style="font-size:0.95rem;">Quản trị viên</h4>
            </div>
            <nav class="sidebar-menu">
                <a href="/pages/admin/dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/pages/admin/users.html"><i class="fas fa-users"></i> Người dùng</a>
                <a href="/pages/admin/products.html"><i class="fas fa-box"></i> Sản phẩm</a>
                <a href="/pages/admin/orders.html"><i class="fas fa-receipt"></i> Đơn hàng</a>
                <a href="/pages/admin/shops.html" class="active"><i class="fas fa-store"></i> Gian hàng</a>
                <a href="/pages/admin/revenue.html"><i class="fas fa-chart-bar"></i> Doanh thu</a>
                <a href="/pages/admin/vouchers.html"><i class="fas fa-ticket-alt"></i> Khuyến mãi toàn sàn</a>
                <a href="/pages/admin/complaints.html"><i class="fas fa-flag"></i> Khiếu nại</a>
                <a href="/pages/admin/moderation.html"><i class="fas fa-shield-alt"></i> Kiểm duyệt AI</a>
                <a href="/"><i class="fas fa-arrow-left"></i> Trang chủ</a>
            </nav>
        </aside>
        <main class="dashboard-content">
            <h1 style="margin-bottom:1.5rem;">🏪 Quản lý gian hàng</h1>
            
            <!-- Pending Seller Approvals -->
            <div class="glass" style="padding:1.5rem;margin-bottom:2rem;">
                <h3 style="margin-bottom:1rem;"><i class="fas fa-user-check" style="color:var(--warning)"></i> Yêu cầu đăng ký bán hàng chờ duyệt</h3>
                <div id="pending-sellers"><div class="spinner" style="margin:1rem auto;"></div></div>
            </div>

            <!-- All Shops -->
            <h3 style="margin-bottom:1rem;">Tất cả gian hàng</h3>
            <div id="shops-table"><div class="spinner" style="margin:3rem auto;"></div></div>
        </main>
    </div>

    <!-- Modal Xem Chi Tiết Đăng Ký -->
    <div id="seller-details-modal" class="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;padding:1rem;">
        <div class="modal-content" style="background:#fff;width:100%;max-width:800px;max-height:90vh;border-radius:12px;display:flex;flex-direction:column;box-shadow:0 10px 30px rgba(0,0,0,0.2);">
            <div style="padding:1.2rem 1.5rem;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-radius:12px 12px 0 0;">
                <h3 style="margin:0;"><i class="fas fa-file-invoice"></i> Chi tiết hồ sơ đăng ký</h3>
                <button onclick="document.getElementById('seller-details-modal').style.display='none'" style="background:none;border:none;font-size:1.5rem;cursor:pointer;">&times;</button>
            </div>
            <div id="seller-details-content" style="padding:1.5rem;overflow-y:auto;flex:1;">
                Đang tải...
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
    if(!isLoggedIn()||getUser().vai_tro!=='admin') location.href='/pages/admin/login.html';
    
    // Store pending sellers to view details
    let pendingSellersList = [];

    // Load pending sellers
    async function loadPendingSellers() {
        const r = await api.get('/admin/pending-sellers');
        const container = document.getElementById('pending-sellers');
        if(!r.success || r.data.length === 0) {
            container.innerHTML = '<p style="color:var(--dark-400);text-align:center;padding:1rem;">Không có yêu cầu nào</p>';
            return;
        }
        pendingSellersList = r.data;
        container.innerHTML = r.data.map(s => `
        <div class="glass-card" style="padding:1rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;">
            <div style="width:50px;height:50px;border-radius:50%;background:var(--dark-700);display:flex;align-items:center;justify-content:center;">
                <i class="fas fa-user"></i>
            </div>
            <div style="flex:1;">
                <strong>${s.ho_ten}</strong> (Shop: ${s.ten_shop})<br>
                <small style="color:var(--dark-400);">${s.email}</small><br>
                <small style="color:var(--dark-500);">Ngày đăng ký: ${new Date(s.ngay_tao).toLocaleDateString('vi-VN')}</small>
            </div>
            <div style="display:flex;gap:0.5rem;">
                <button class="btn btn-sm btn-outline" onclick="viewSellerDetails(${s.id})">
                    <i class="fas fa-eye"></i> Chi tiết
                </button>
                <button class="btn btn-sm btn-success" onclick="verifySeller(${s.id},'verified')">
                    <i class="fas fa-check"></i> Duyệt
                </button>
                <button class="btn btn-sm btn-danger" onclick="rejectSeller(${s.id})">
                    <i class="fas fa-times"></i> Từ chối
                </button>
            </div>
        </div>`).join('');
    }
    
    function getFullUrl(path) {
        if (!path) return '';
        if (path.startsWith('http')) return path;
        return window.location.origin + '/' + path.replace(/^[\/\\]+/, '');
    }

    function viewSellerDetails(id) {
        const s = pendingSellersList.find(x => x.id === id);
        if(!s) return;
        
        const content = document.getElementById('seller-details-content');
        content.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">
                <div>
                    <h4 style="margin-bottom:1rem;color:#4f46e5;"><i class="fas fa-user"></i> Thông tin cá nhân</h4>
                    <table class="data-table">
                        <tr><th>Họ tên</th><td>${s.ho_ten}</td></tr>
                        <tr><th>Email</th><td>${s.email}</td></tr>
                        <tr><th>Số điện thoại</th><td>${s.so_dien_thoai || 'Chưa cập nhật'}</td></tr>
                    </table>

                    <h4 style="margin-bottom:1rem;margin-top:1.5rem;color:#10b981;"><i class="fas fa-store"></i> Thông tin gian hàng</h4>
                    <table class="data-table">
                        <tr><th>Tên Shop</th><td>${s.ten_shop}</td></tr>
                        <tr><th>Mô tả</th><td>${s.mo_ta_shop || ''}</td></tr>
                        <tr><th>Địa chỉ kho</th><td>${s.dia_chi_kho}</td></tr>
                        <tr><th>Vận chuyển</th><td>${s.phuong_thuc_van_chuyen || ''}</td></tr>
                        <tr><th>Mã số thuế</th><td>${s.ma_so_thue || 'Không có'}</td></tr>
                        <tr><th>Đồng ý chính sách</th><td>${s.dong_y_chinh_sach ? '<span style="color:var(--success)"><i class="fas fa-check-circle"></i> Đã đồng ý</span>' : '<span style="color:var(--danger)"><i class="fas fa-times-circle"></i> Chưa đồng ý</span>'}</td></tr>
                    </table>
                </div>
                
                <div>
                    <h4 style="margin-bottom:1rem;color:#f59e0b;"><i class="fas fa-id-card"></i> Hình ảnh xác thực</h4>
                    <div style="display:flex;flex-direction:column;gap:1rem;">
                        <div>
                            <p style="margin:0 0 5px;font-weight:600;font-size:0.9rem;">CCCD/CMND Mặt trước</p>
                            ${s.cccd_mat_truoc ? `<img src="${getFullUrl(s.cccd_mat_truoc)}" style="max-width:100%;border-radius:8px;border:1px solid #e5e7eb;max-height:200px;object-fit:cover;">` : '<em>Không có</em>'}
                        </div>
                        <div>
                            <p style="margin:0 0 5px;font-weight:600;font-size:0.9rem;">CCCD/CMND Mặt sau</p>
                            ${s.cccd_mat_sau ? `<img src="${getFullUrl(s.cccd_mat_sau)}" style="max-width:100%;border-radius:8px;border:1px solid #e5e7eb;max-height:200px;object-fit:cover;">` : '<em>Không có</em>'}
                        </div>
                        <div>
                            <p style="margin:0 0 5px;font-weight:600;font-size:0.9rem;">Ảnh chân dung</p>
                            ${s.anh_guong_mat ? `<img src="${getFullUrl(s.anh_guong_mat)}" style="max-width:100%;border-radius:8px;border:1px solid #e5e7eb;max-height:200px;object-fit:cover;">` : '<em>Không có</em>'}
                        </div>
                        <div>
                            <p style="margin:0 0 5px;font-weight:600;font-size:0.9rem;">Giấy phép kinh doanh</p>
                            ${s.giay_phep_kinh_doanh ? `<a href="${getFullUrl(s.giay_phep_kinh_doanh)}" target="_blank" class="btn btn-sm btn-primary"><i class="fas fa-external-link-alt"></i> Xem giấy phép</a>` : '<em>Không có</em>'}
                        </div>
                    </div>
                </div>
            </div>
            
            <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:1rem;">
                <button class="btn btn-outline" onclick="document.getElementById('seller-details-modal').style.display='none'">Đóng</button>
                <button class="btn btn-danger" onclick="document.getElementById('seller-details-modal').style.display='none';rejectSeller(${s.id})"><i class="fas fa-times"></i> Từ chối</button>
                <button class="btn btn-success" onclick="document.getElementById('seller-details-modal').style.display='none';verifySeller(${s.id},'verified')"><i class="fas fa-check"></i> Duyệt</button>
            </div>
        `;
        document.getElementById('seller-details-modal').style.display = 'flex';
    }
    
    async function verifySeller(id, status) {
        if(!confirm('Duyệt tài khoản người bán?')) return;
        const r = await api.put(`/admin/verify-seller/${id}`, {trang_thai_xac_thuc: status, ly_do_tu_choi: ''});
        if(r.success) {
            showToast('Đã duyệt tài khoản!');
            loadPendingSellers();
        } else {
            showToast(r.message, 'error');
        }
    }
    
    async function rejectSeller(id) {
        const reason = prompt('Nhập lý do từ chối:');
        if(!reason) return;
        const r = await api.put(`/admin/verify-seller/${id}`, {trang_thai_xac_thuc: 'rejected', ly_do_tu_choi: reason});
        if(r.success) {
            showToast('Đã từ chối tài khoản!');
            loadPendingSellers();
        } else {
            showToast(r.message, 'error');
        }
    }
    
    async function load() {
        loadPendingSellers();
        
        const r = await api.get('/admin/shops');
        if(!r.success) return;
        document.getElementById('shops-table').innerHTML = `<div class="table-container"><table class="data-table"><thead><tr>
            <th>ID</th><th>Tên gian hàng</th><th>Chủ shop</th><th>Email</th><th>SP</th><th>Đơn</th><th>Doanh thu</th><th>Trạng thái</th><th>Thao tác</th>
        </tr></thead><tbody>${r.data.map(s => `<tr>
            <td>${s.id}</td><td style="font-weight:700;color:var(--text-primary);">${s.ten_gian_hang}</td>
            <td>${s.ten_nguoi_ban}</td><td>${s.email}</td>
            <td>${s.so_san_pham}</td><td>${s.so_don_hang}</td>
            <td style="font-weight:700;color:var(--danger);">${formatPrice(s.doanh_thu||0)}</td>
            <td><span class="status ${s.trang_thai==='active'?'status-active':'status-cancelled'}">${s.trang_thai}</span></td>
            <td style="display:flex;gap:6px;align-items:center;">${s.trang_thai==='active'
                ?`<button class="btn btn-sm btn-danger" onclick="updateShop(${s.id},'banned')"><i class="fas fa-ban"></i></button>`
                :`<button class="btn btn-sm btn-success" onclick="updateShop(${s.id},'active')"><i class="fas fa-check"></i></button>`}
                <button class="btn btn-sm btn-primary" onclick="viewShopRevenue(${s.id}, '${(s.ten_gian_hang || '').replace(/'/g, "\\'").replace(/"/g, '&quot;')}')"><i class="fas fa-chart-line"></i> Doanh thu</button>
            </td>
        </tr>`).join('')}</tbody></table></div>`;
    }
    async function updateShop(id, status) {
        if(!confirm(`${status==='banned'?'Ban':'Mở'} gian hàng?`)) return;
        await api.put(`/admin/shops/${id}`, {trang_thai: status});
        showToast('Cập nhật thành công!'); load();
    }
    load();

    // Revenue modal — supports filter by day/week/month/year + click-to-expand orders
    let adminShopRevChart = null;

    function pad2(n){ return n<10?'0'+n:''+n; }
    function isoDate(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }

    function viewShopRevenue(id, name) {
        // Build modal shell
        const modal = document.createElement('div');
        modal.className = 'modal admin-rev-modal';
        modal.style = 'position:fixed;inset:0;background:rgba(15,23,42,0.55);display:flex;align-items:center;justify-content:center;z-index:10000;padding:1rem;';
        const today = new Date();
        const monthAgo = new Date(); monthAgo.setMonth(monthAgo.getMonth()-1);
        modal.innerHTML = `<div class="modal-content" style="background:#ffffff;max-width:900px;width:100%;max-height:90vh;overflow-y:auto;padding:1.5rem;border-radius:16px;position:relative;border:1px solid #e2e8f0;box-shadow:0 20px 60px rgba(0,0,0,0.18);">
            <button class="modal-close" style="position:absolute;right:12px;top:12px;background:none;border:none;font-size:1.4rem;color:var(--text-secondary);cursor:pointer;">&times;</button>
            <h3 style="margin-bottom:1rem;color:var(--text-primary);"><i class="fas fa-chart-line" style="color:var(--success);"></i> Doanh thu - ${name}</h3>
            <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:1rem;padding:12px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:10px;">
                <div style="display:flex;gap:6px;flex-wrap:wrap;" id="ars-quick">
                    <button type="button" class="btn btn-sm btn-outline ars-q" data-range="today">Hôm nay</button>
                    <button type="button" class="btn btn-sm btn-outline ars-q" data-range="week">Tuần này</button>
                    <button type="button" class="btn btn-sm btn-outline ars-q" data-range="month">Tháng này</button>
                    <button type="button" class="btn btn-sm btn-outline ars-q" data-range="year">Năm nay</button>
                </div>
                <label style="font-weight:600;color:var(--text-primary);font-size:0.9rem;">Từ <input type="date" id="ars-from" style="margin-left:4px;"></label>
                <label style="font-weight:600;color:var(--text-primary);font-size:0.9rem;">Đến <input type="date" id="ars-to" style="margin-left:4px;"></label>
                <label style="font-weight:600;color:var(--text-primary);font-size:0.9rem;">Nhóm
                    <select id="ars-group" style="margin-left:4px;">
                        <option value="day">Ngày</option>
                        <option value="week">Tuần</option>
                        <option value="month" selected>Tháng</option>
                        <option value="year">Năm</option>
                    </select>
                </label>
                <button class="btn btn-sm btn-primary" id="ars-go"><i class="fas fa-filter"></i> Xem</button>
            </div>
            <div id="ars-content"><div class="spinner" style="margin:2rem auto;"></div></div>
        </div>`;
        modal.querySelector('.modal-close').onclick = () => { if (adminShopRevChart) { adminShopRevChart.destroy(); adminShopRevChart=null; } modal.remove(); };
        document.body.appendChild(modal);

        // Defaults: last month, group by month
        document.getElementById('ars-from').value = isoDate(monthAgo);
        document.getElementById('ars-to').value = isoDate(today);

        async function loadRev() {
            const from = document.getElementById('ars-from').value;
            const to = document.getElementById('ars-to').value;
            const group = document.getElementById('ars-group').value;
            const q = [];
            if (from) q.push('from='+from);
            if (to) q.push('to='+to);
            if (group) q.push('groupBy='+group);
            const qs = q.length?'?'+q.join('&'):'';
            const container = document.getElementById('ars-content');
            container.innerHTML = '<div class="spinner" style="margin:2rem auto;"></div>';
            const r = await api.get(`/admin/shops/${id}/revenue${qs}`);
            if (!r.success) { container.innerHTML = `<p style="color:var(--danger);text-align:center;padding:1rem;">${r.message||'Lỗi tải dữ liệu'}</p>`; return; }
            const rows = r.data || [];
            const total = rows.reduce((a,b)=>a+parseFloat(b.doanh_thu||0),0);
            const totalOrders = rows.reduce((a,b)=>a+parseInt(b.so_don||0),0);

            let html = `<div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
                <div style="flex:1;min-width:180px;padding:12px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:10px;">
                    <div style="font-size:0.8rem;color:#047857;font-weight:600;">Tổng doanh thu</div>
                    <div style="font-size:1.4rem;font-weight:800;color:#065f46;">${formatPrice(total)}</div>
                </div>
                <div style="flex:1;min-width:180px;padding:12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;">
                    <div style="font-size:0.8rem;color:#1d4ed8;font-weight:600;">Tổng đơn</div>
                    <div style="font-size:1.4rem;font-weight:800;color:#1e3a8a;">${totalOrders}</div>
                </div>
            </div>
            <div style="padding:1rem;background:#ffffff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:1rem;"><canvas id="ars-chart" style="max-height:240px;"></canvas></div>
            <div><h4 style="margin-bottom:8px;color:var(--text-primary);">Chi tiết theo ${ {day:'ngày',week:'tuần',month:'tháng',year:'năm'}[group] }</h4>`;
            if (rows.length===0) {
                html += '<p style="color:var(--text-muted);text-align:center;padding:1rem;font-weight:500;">Không có dữ liệu trong khoảng thời gian này</p>';
            } else {
                rows.forEach((rw, idx) => {
                    const label = rw.thoi_gian || rw.thang;
                    html += `<details data-idx="${idx}" style="margin-bottom:6px;border:1px solid #e2e8f0;border-radius:8px;">
                        <summary style="cursor:pointer;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-radius:8px;">
                            <span style="font-weight:700;color:var(--text-primary);">${label}</span>
                            <span style="font-weight:700;color:var(--success);">${formatPrice(rw.doanh_thu||0)} <small style="color:var(--text-muted);font-weight:500;margin-left:6px;">(${rw.so_don} đơn)</small></span>
                        </summary>
                        <div class="ars-orders" style="padding:12px;background:#ffffff;border-top:1px solid #e2e8f0;">Đang tải...</div>
                    </details>`;
                });
            }
            html += '</div>';
            container.innerHTML = html;

            // Chart
            if (adminShopRevChart) { adminShopRevChart.destroy(); adminShopRevChart=null; }
            if (rows.length > 0) {
                const ctx = document.getElementById('ars-chart').getContext('2d');
                adminShopRevChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: rows.map(x => x.thoi_gian || x.thang),
                        datasets: [{ label:'Doanh thu (VND)', data: rows.map(x => parseFloat(x.doanh_thu||0)), backgroundColor:'rgba(16,185,129,0.7)' }]
                    },
                    options: {
                        responsive:true, maintainAspectRatio:false,
                        scales:{ y:{ ticks:{ callback: v => new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(v) } } }
                    }
                });
            }

            // Attach expand handlers
            container.querySelectorAll('details').forEach((det) => {
                det.addEventListener('toggle', async () => {
                    if (!det.open) return;
                    const idx = parseInt(det.dataset.idx);
                    const row = rows[idx];
                    const orderEl = det.querySelector('.ars-orders');
                    if (orderEl.dataset.loaded === '1') return;
                    let gFrom, gTo;
                    if (group === 'day') { gFrom = row.thoi_gian; gTo = row.thoi_gian; }
                    else if (group === 'week') {
                        const [y, w] = row.thoi_gian.split('-W');
                        const wkStart = new Date(parseInt(y),0,1 + (parseInt(w)-1)*7);
                        gFrom = isoDate(wkStart);
                        const wkEnd = new Date(wkStart); wkEnd.setDate(wkStart.getDate()+6);
                        gTo = isoDate(wkEnd);
                    } else if (group === 'month') {
                        gFrom = row.thoi_gian + '-01';
                        const [y,m] = row.thoi_gian.split('-').map(Number);
                        const last = new Date(y, m, 0);
                        gTo = isoDate(last);
                    } else if (group === 'year') {
                        gFrom = row.thoi_gian + '-01-01';
                        gTo = row.thoi_gian + '-12-31';
                    }
                    try {
                        const or = await api.get(`/admin/shops/${id}/orders?from=${gFrom}&to=${gTo}`);
                        if (!or.success) { orderEl.innerHTML = `<div style="color:var(--danger);">${or.message||'Lỗi'}</div>`; return; }
                        if (!or.data || or.data.length===0) { orderEl.innerHTML = '<div style="color:var(--text-muted);font-weight:500;">Không có đơn hoàn thành trong khoảng này</div>'; return; }
                        orderEl.innerHTML = or.data.map(o => `
                            <div style="padding:10px 0;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;gap:10px;">
                                <div>
                                    <div><strong style="color:var(--text-primary);">#${o.id}</strong> <span style="color:var(--text-secondary);">${o.ten_nguoi_mua||''}</span></div>
                                    <div style="font-size:0.8rem;color:var(--text-muted);">${formatDate(o.ngay_tao)} ${o.sdt_nguoi_mua?'· '+o.sdt_nguoi_mua:''}</div>
                                </div>
                                <div style="font-weight:700;color:var(--danger);">${formatPrice(o.tong_tien)}</div>
                            </div>`).join('');
                        orderEl.dataset.loaded = '1';
                    } catch(e) { console.error(e); orderEl.innerHTML = '<div style="color:var(--danger);">Lỗi server</div>'; }
                });
            });
        }

        // Quick range buttons
        modal.querySelectorAll('.ars-q').forEach(btn => {
            btn.addEventListener('click', () => {
                const range = btn.dataset.range;
                const now = new Date();
                let f, t = new Date(now);
                const gs = document.getElementById('ars-group');
                if (range==='today') { f = new Date(now); gs.value='day'; }
                else if (range==='week') { f = new Date(now); const dow=(f.getDay()+6)%7; f.setDate(f.getDate()-dow); gs.value='day'; }
                else if (range==='month') { f = new Date(now.getFullYear(), now.getMonth(), 1); gs.value='day'; }
                else if (range==='year') { f = new Date(now.getFullYear(), 0, 1); gs.value='month'; }
                document.getElementById('ars-from').value = isoDate(f);
                document.getElementById('ars-to').value = isoDate(t);
                modal.querySelectorAll('.ars-q').forEach(b => { b.classList.toggle('btn-primary', b===btn); b.classList.toggle('btn-outline', b!==btn); });
                loadRev();
            });
        });
        document.getElementById('ars-go').addEventListener('click', loadRev);
        loadRev();
    }
    </script>
</body>
</html>
