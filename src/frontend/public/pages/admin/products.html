<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm - Admin Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .tab-nav { display:flex; gap:4px; margin-bottom:1.5rem; background:var(--dark-800); padding:6px; border-radius:14px; border:1px solid var(--dark-700); }
        .tab-btn { flex:1; padding:0.6rem 1rem; border-radius:10px; border:none; background:transparent; color:var(--text-secondary); font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:6px; }
        .tab-btn.active { background:var(--gradient-primary); color:#ffffff; font-weight:700; }
        .tab-btn .cnt { background:rgba(255,255,255,0.25); border-radius:10px; padding:1px 8px; font-size:0.75rem; min-width:22px; text-align:center; font-weight:700; }
        .tab-btn:not(.active) .cnt { background:#cbd5e1; color:var(--text-primary); }
        .approve-img { width:60px; height:60px; object-fit:cover; border-radius:8px; }
        .reject-reason { width:100%; padding:8px; background:#ffffff; border:1px solid #cbd5e1; border-radius:8px; color:var(--text-primary); font-size:0.85rem; margin-top:6px; resize:none; }
        .status-pending { background:rgba(234,179,8,0.15); color:#fbbf24; border:1px solid rgba(234,179,8,0.3); }
        .status-approved { background:rgba(34,197,94,0.15); color:#4ade80; border:1px solid rgba(34,197,94,0.3); }
        .status-rejected { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
        .status-badge { padding:2px 10px; border-radius:20px; font-size:0.75rem; font-weight:600; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="navbar-container"><a href="/" class="navbar-brand"><i class="fas fa-shopping-bag"></i> Vipo</a><div class="navbar-actions" id="nav-actions"></div></div></nav>
    <div class="dashboard-layout" style="padding:90px 2rem 2rem;">
        <aside class="sidebar glass">
            <div style="text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--dark-700);">
                <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1.5rem;"><i class="fas fa-crown"></i></div>
                <h4 style="font-size:0.95rem;">Quản trị viên</h4>
            </div>
            <nav class="sidebar-menu">
                <a href="/pages/admin/dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/pages/admin/users.html"><i class="fas fa-users"></i> Người dùng <span class="alert-badge" id="badge-sellers" style="display:none;">0</span></a>
                <a href="/pages/admin/products.html" class="active"><i class="fas fa-box"></i> Sản phẩm <span class="alert-badge" id="badge-products" style="display:none;">0</span></a>
                <a href="/pages/admin/orders.html"><i class="fas fa-receipt"></i> Đơn hàng</a>
                <a href="/pages/admin/shops.html"><i class="fas fa-store"></i> Gian hàng</a>
                <a href="/pages/admin/revenue.html"><i class="fas fa-chart-bar"></i> Doanh thu</a>
                <a href="/pages/admin/vouchers.html"><i class="fas fa-ticket-alt"></i> Khuyến mãi toàn sàn</a>
                <a href="/pages/admin/complaints.html"><i class="fas fa-flag"></i> Khiếu nại <span class="alert-badge" id="badge-complaints" style="display:none;">0</span></a>
                <a href="/pages/admin/moderation.html"><i class="fas fa-shield-alt"></i> Kiểm duyệt AI</a>
                <a href="/"><i class="fas fa-arrow-left"></i> Trang chủ</a>
            </nav>
        </aside>
        <main class="dashboard-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <h1>📦 Quản lý sản phẩm</h1>
                <div style="font-size:0.85rem;color:var(--dark-400);">Duyệt sản phẩm từ người bán</div>
            </div>

            <!-- Tabs -->
            <div class="tab-nav">
                <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
                    <i class="fas fa-clock"></i> Chờ duyệt <span class="cnt" id="cnt-pending">0</span>
                </button>
                <button class="tab-btn" id="tab-all" onclick="switchTab('all')">
                    <i class="fas fa-list"></i> Tất cả sản phẩm <span class="cnt" id="cnt-all">0</span>
                </button>
            </div>

            <!-- Content -->
            <div id="products-content"><div class="spinner" style="margin:3rem auto;"></div></div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script>
    if(!isLoggedIn()||getUser().vai_tro!=='admin') location.href='/pages/admin/login.html';

    let currentTab = 'pending';

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        if (tab === 'pending') loadPending();
        else loadAll();
    }

    async function loadPending() {
        const el = document.getElementById('products-content');
        el.innerHTML = '<div class="spinner" style="margin:3rem auto;"></div>';
        const r = await api.get('/admin/pending-products');
        document.getElementById('cnt-pending').textContent = r.success ? r.data.length : 0;

        if (!r.success || r.data.length === 0) {
            el.innerHTML = `<div class="glass-card" style="padding:3rem;text-align:center;">
                <i class="fas fa-check-circle" style="font-size:3rem;color:var(--success);opacity:0.5;display:block;margin-bottom:1rem;"></i>
                <p style="color:var(--dark-400);">Không có sản phẩm nào chờ duyệt!</p>
            </div>`;
            return;
        }

        el.innerHTML = `<div class="table-container"><table class="data-table">
            <thead><tr>
                <th>Hình</th><th>Tên sản phẩm</th><th>Gian hàng</th><th>Danh mục</th>
                <th>Giá</th><th>Tồn kho</th><th>Ngày đăng</th><th>Thao tác</th>
            </tr></thead>
            <tbody>${r.data.map(p => `<tr id="row-${p.id}">
                <td><img class="approve-img" src="${getProductImage(p.hinh_anh)}"></td>
                <td style="font-weight:500;color:var(--text-primary);max-width:180px;">
                    <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.ten_san_pham}</div>
                    <small style="color:var(--dark-400);">${p.ten_nguoi_ban}</small>
                </td>
                <td><a href="/pages/shop.html?id=${p.gian_hang_id}" target="_blank" style="color:var(--primary-light);">${p.ten_gian_hang}</a></td>
                <td>${p.ten_danh_muc || '—'}</td>
                <td style="color:var(--danger);font-weight:600;">${formatPrice(p.gia)}${p.gia_khuyen_mai ? `<br><small style="color:var(--success)">KM: ${formatPrice(p.gia_khuyen_mai)}</small>` : ''}</td>
                <td>${p.so_luong_ton}</td>
                <td style="font-size:0.8rem;">${new Date(p.ngay_tao).toLocaleDateString('vi-VN')}</td>
                <td>
                    <div style="display:flex;flex-direction:column;gap:6px;min-width:160px;">
                        <button class="btn btn-sm btn-success" onclick="approveProduct(${p.id},'approved')">
                            <i class="fas fa-check"></i> Duyệt
                        </button>
                        <div>
                            <textarea class="reject-reason" id="reason-${p.id}" rows="2" placeholder="Lý do từ chối..."></textarea>
                            <button class="btn btn-sm btn-danger" onclick="approveProduct(${p.id},'rejected')" style="width:100%;margin-top:4px;">
                                <i class="fas fa-times"></i> Từ chối
                            </button>
                        </div>
                    </div>
                </td>
            </tr>`).join('')}</tbody>
        </table></div>`;
    }

    async function approveProduct(id, status) {
        const reason = document.getElementById('reason-' + id)?.value;
        if (status === 'rejected' && !reason) { showToast('Vui lòng nhập lý do từ chối', 'warning'); return; }
        const r = await api.put(`/admin/approve-product/${id}`, { trang_thai_duyet: status, ly_do_tu_choi: reason || null });
        if (r.success) {
            showToast(status === 'approved' ? '✅ Đã duyệt sản phẩm!' : '❌ Đã từ chối sản phẩm!');
            const row = document.getElementById('row-' + id);
            if (row) { row.style.opacity = '0'; row.style.transition = 'opacity 0.3s'; setTimeout(() => { row.remove(); loadPending(); }, 300); }
        } else showToast(r.message, 'error');
    }

    async function loadAll() {
        const el = document.getElementById('products-content');
        el.innerHTML = '<div class="spinner" style="margin:3rem auto;"></div>';
        const r = await api.get('/admin/products');
        document.getElementById('cnt-all').textContent = r.success ? r.data.length : 0;
        if (!r.success) return;

        const approvalLabel = { pending:'Chờ duyệt', approved:'Đã duyệt', rejected:'Từ chối' };
        const approvalClass = { pending:'status-pending', approved:'status-approved', rejected:'status-rejected' };

        el.innerHTML = `<div class="table-container"><table class="data-table">
            <thead><tr>
                <th>Hình</th><th>Tên SP</th><th>Gian hàng</th><th>Danh mục</th>
                <th>Giá</th><th>Tồn</th><th>Trạng thái</th><th>Duyệt</th><th>Thao tác</th>
            </tr></thead>
            <tbody>${r.data.map(p => `<tr>
                <td><img class="approve-img" src="${getProductImage(p.hinh_anh)}"></td>
                <td style="font-weight:500;color:var(--text-primary);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.ten_san_pham}</td>
                <td>${p.ten_gian_hang}</td>
                <td>${p.ten_danh_muc||'—'}</td>
                <td style="color:var(--danger);font-weight:600;">${formatPrice(p.gia)}</td>
                <td>${p.so_luong_ton}</td>
                <td><span class="status ${p.trang_thai==='active'?'status-active':'status-locked'}">${p.trang_thai==='active'?'Đang bán':'Ẩn'}</span></td>
                <td><span class="status-badge ${approvalClass[p.trang_thai_duyet]||'status-pending'}">${approvalLabel[p.trang_thai_duyet]||p.trang_thai_duyet}</span></td>
                <td style="display:flex;gap:4px;">
                    ${p.trang_thai==='active'
                        ? `<button class="btn btn-sm btn-danger" onclick="banProduct(${p.id})" title="Ẩn sản phẩm"><i class="fas fa-ban"></i></button>`
                        : `<button class="btn btn-sm btn-success" onclick="unbanProduct(${p.id})" title="Hiện sản phẩm"><i class="fas fa-check"></i></button>`}
                    <a class="btn btn-sm btn-outline" href="/pages/product-detail.html?id=${p.id}" target="_blank" title="Xem"><i class="fas fa-eye"></i></a>
                </td>
            </tr>`).join('')}</tbody>
        </table></div>`;
    }

    async function banProduct(id) {
        if(!confirm('Ẩn sản phẩm này?')) return;
        await api.put(`/admin/products/${id}`, {trang_thai:'banned'});
        showToast('Đã ẩn sản phẩm!'); loadAll();
    }
    async function unbanProduct(id) {
        await api.put(`/admin/products/${id}`, {trang_thai:'active'});
        showToast('Đã hiện sản phẩm!'); loadAll();
    }

    // Init
    loadPending();
    </script>
</body>
</html>
