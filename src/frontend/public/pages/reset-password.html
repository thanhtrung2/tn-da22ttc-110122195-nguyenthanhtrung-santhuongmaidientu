<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card glass">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <a href="/" class="navbar-brand" style="justify-content:center;font-size:1.8rem;">
                    <i class="fas fa-shopping-bag"></i> Vipo
                </a>
            </div>
            <h2>Đặt lại mật khẩu</h2>
            <p class="subtitle">Vui lòng nhập mã OTP và mật khẩu mới của bạn.</p>

            <form id="reset-password-form" onsubmit="handleResetPassword(event)">
                <div class="form-group" style="display:none;">
                    <input type="email" id="email" class="form-control" readonly>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Mã xác thực (OTP)</label>
                    <input type="text" class="form-control" id="otp" placeholder="Nhập mã 6 chữ số..." required maxlength="6" style="letter-spacing: 2px; text-align: center; font-size: 1.1rem; font-weight: bold;">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Mật khẩu mới</label>
                    <div style="position:relative;">
                        <input type="password" class="form-control" id="new-password" placeholder="Nhập mật khẩu mới..." required>
                        <button type="button" onclick="togglePassword('new-password', 'toggle-pw-icon')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dark-400);cursor:pointer;">
                            <i class="fas fa-eye" id="toggle-pw-icon"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Xác nhận mật khẩu mới</label>
                    <div style="position:relative;">
                        <input type="password" class="form-control" id="confirm-password" placeholder="Nhập lại mật khẩu mới..." required>
                        <button type="button" onclick="togglePassword('confirm-password', 'toggle-pw-icon-confirm')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dark-400);cursor:pointer;">
                            <i class="fas fa-eye" id="toggle-pw-icon-confirm"></i>
                        </button>
                    </div>
                </div>
                
                <div id="error-msg" style="color:var(--danger);font-size:0.85rem;margin-bottom:1rem;display:none;"></div>
                
                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;" id="submit-btn">
                    <i class="fas fa-check-circle"></i> Đặt lại mật khẩu
                </button>
            </form>

            <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--dark-400);">
                Quay lại <a href="/pages/login.html" style="color:var(--primary-light);font-weight:600;">Đăng nhập</a>
            </p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // Load email from query param
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            if (email) {
                document.getElementById('email').value = email;
            } else {
                window.location.href = '/pages/forgot-password.html';
            }
        });

        function togglePassword(inputId, iconId) {
            const pw = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (pw.type === 'password') { pw.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { pw.type = 'password'; icon.className = 'fas fa-eye'; }
        }

        async function handleResetPassword(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Mật khẩu xác nhận không khớp.';
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';

            const result = await api.post('/auth/reset-password', {
                email,
                otp,
                newPassword
            });

            if (result.success) {
                showToast('Đặt lại mật khẩu thành công!', 'success');
                setTimeout(() => {
                    window.location.href = '/pages/login.html';
                }, 1500);
            } else {
                errorMsg.textContent = result.message || 'Có lỗi xảy ra';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Đặt lại mật khẩu';
            }
        }
    </script>
</body>
</html>
