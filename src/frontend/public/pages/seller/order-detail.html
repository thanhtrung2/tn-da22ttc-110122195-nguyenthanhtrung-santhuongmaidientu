<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng - Seller - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* ─── Timeline ─────────────────────────────── */
        .timeline {
            display: flex;
            align-items: center;
            gap: 0;
            padding: 1.5rem 1rem;
            position: relative;
        }
        .tl-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }
        .tl-step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: calc(50% + 20px);
            top: 20px;
            width: calc(100% - 40px);
            height: 3px;
            background: var(--dark-600);
            z-index: 0;
        }
        .tl-step.done:not(:last-child)::after {
            background: var(--primary);
        }
        .tl-icon {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            z-index: 1;
            background: var(--dark-700);
            border: 3px solid var(--dark-600);
            color: var(--dark-400);
            transition: all 0.3s;
        }
        .tl-step.done .tl-icon {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 16px rgba(99,102,241,0.5);
        }
        .tl-step.current .tl-icon {
            background: transparent;
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 4px rgba(99,102,241,0.15); }
            50%       { box-shadow: 0 0 0 8px rgba(99,102,241,0.08); }
        }
        .tl-step.cancelled .tl-icon {
            background: rgba(239,68,68,0.1);
            border-color: var(--danger);
            color: var(--danger);
        }
        .tl-label {
            margin-top: 10px;
            font-size: 0.72rem;
            text-align: center;
            color: var(--dark-400);
            font-weight: 600;
            letter-spacing: 0.2px;
        }
        .tl-step.done .tl-label,
        .tl-step.current .tl-label { color: var(--dark-200); }
        .tl-step.cancelled .tl-label { color: var(--danger); }
        .tl-date {
            font-size: 0.65rem;
            color: var(--dark-500);
            margin-top: 3px;
            text-align: center;
        }

        /* ─── Finance Breakdown ────────────────────── */
        .finance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--dark-700);
            font-size: 0.88rem;
        }
        .finance-row:last-child { border-bottom: none; }
        .finance-row .label { color: var(--dark-400); display: flex; align-items: center; gap: 8px; }
        .finance-row .value { font-weight: 600; }
        .finance-row.total {
            padding-top: 16px;
            margin-top: 6px;
            border-top: 2px solid var(--dark-600);
            border-bottom: none;
        }
        .finance-row.total .label { color: var(--dark-200); font-weight: 700; font-size: 0.95rem; }
        .finance-row.total .value { color: var(--success); font-size: 1.1rem; }

        /* ─── Status badge ─────────────────────────── */
        .status-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700;
        }

        /* ─── Product list ─────────────────────────── */
        .product-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 0; border-bottom: 1px solid var(--dark-700);
        }
        .product-item:last-child { border-bottom: none; }
        .product-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }

        /* ─── Actions ──────────────────────────────── */
        .action-bar {
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
            padding: 1.25rem; border-top: 1px solid var(--dark-700);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar"><div class="navbar-container">
        <a href="/" class="navbar-brand"><i class="fas fa-shopping-bag"></i> Vipo</a>
        <div class="navbar-actions" id="nav-actions"></div>
    </div></nav>

    <div class="dashboard-layout" style="padding:90px 2rem 2rem;">
        <aside class="sidebar glass">
            <div style="text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--dark-700);">
                <div style="width:60px;height:60px;border-radius:50%;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1.5rem;"><i class="fas fa-store"></i></div>
                <h4 style="font-size:0.95rem;" id="shop-name">Gian hàng</h4>
            </div>
            <nav class="sidebar-menu">
                <a href="/pages/seller/dashboard.html"><i class="fas fa-chart-line"></i> Tổng quan</a>
                <a href="/pages/seller/products.html"><i class="fas fa-box"></i> Sản phẩm</a>
                <a href="/pages/seller/orders.html" class="active"><i class="fas fa-shopping-cart"></i> Đơn hàng</a>
                <a href="/pages/seller/shop.html"><i class="fas fa-store"></i> Gian hàng</a>
                <a href="/pages/seller/reviews.html"><i class="fas fa-star"></i> Đánh giá</a>
                <a href="/pages/seller/revenue.html"><i class="fas fa-chart-bar"></i> Doanh thu</a>
                <a href="/pages/seller/promotions.html"><i class="fas fa-tags"></i> Khuyến mãi</a>
                <a href="/pages/seller/chat.html"><i class="fas fa-comments"></i> Chat</a>
                <a href="/pages/seller/complaints.html"><i class="fas fa-flag"></i> Khiếu nại</a>
                <a href="/"><i class="fas fa-arrow-left"></i> Về trang chủ</a>
            </nav>
        </aside>

        <main class="dashboard-content">
            <!-- Breadcrumb -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;font-size:0.85rem;color:var(--dark-400);">
                <a href="/pages/seller/orders.html" style="color:var(--primary);text-decoration:none;"><i class="fas fa-arrow-left"></i> Quản lý đơn hàng</a>
                <span>/</span>
                <span id="bc-order-id">Chi tiết đơn hàng</span>
            </div>

            <div id="detail-content">
                <div class="spinner" style="margin:4rem auto;"></div>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
    if(!isLoggedIn() || getUser().vai_tro !== 'seller') location.href = '/pages/profile.html#seller';

    const orderId = new URLSearchParams(location.search).get('id');
    if (!orderId) location.href = '/pages/seller/orders.html';

    const STATUS_MAP = {
        cho_xac_nhan: { label: 'Chờ xác nhận', color: '#f59e0b', bg: 'rgba(245,158,11,0.12)', icon: 'fa-clock' },
        da_xac_nhan:  { label: 'Đã xác nhận',  color: '#6366f1', bg: 'rgba(99,102,241,0.12)', icon: 'fa-check-circle' },
        dang_giao:    { label: 'Đang giao',     color: '#3b82f6', bg: 'rgba(59,130,246,0.12)', icon: 'fa-truck' },
        hoan_thanh:   { label: 'Hoàn thành',    color: '#22c55e', bg: 'rgba(34,197,94,0.12)',  icon: 'fa-check-double' },
        da_huy:       { label: 'Đã hủy',        color: '#ef4444', bg: 'rgba(239,68,68,0.12)',  icon: 'fa-ban' },
    };

    const STEPS = [
        { key: 'cho_xac_nhan', label: 'Chờ xác nhận', icon: 'fa-clock' },
        { key: 'da_xac_nhan',  label: 'Đã xác nhận',  icon: 'fa-check-circle' },
        { key: 'dang_giao',    label: 'Đang giao',     icon: 'fa-truck' },
        { key: 'hoan_thanh',   label: 'Hoàn thành',    icon: 'fa-box-open' },
    ];

    async function loadShopInfo() {
        const r = await api.get('/shops/my-shop');
        if(r.success) document.getElementById('shop-name').textContent = r.data.ten_gian_hang;
    }

    async function loadOrderDetail() {
        const r = await api.get(`/orders/${orderId}`);
        if (!r.success) {
            document.getElementById('detail-content').innerHTML = `<div class="glass-card" style="text-align:center;padding:3rem;"><i class="fas fa-exclamation-triangle" style="font-size:2.5rem;color:var(--danger);margin-bottom:1rem;"></i><p>Không tìm thấy đơn hàng hoặc bạn không có quyền truy cập.</p></div>`;
            return;
        }
        const o = r.data;
        const items = r.data.items || [];

        document.getElementById('bc-order-id').textContent = `Đơn #${o.id}`;
        document.title = `Chi tiết đơn #${o.id} - Vipo`;

        const status = STATUS_MAP[o.trang_thai] || { label: o.trang_thai, color: '#94a3b8', bg: 'rgba(148,163,184,0.12)', icon: 'fa-question' };
        const isCancelled = o.trang_thai === 'da_huy';

        // ─── Timeline HTML ────────────────────────────────
        let timelineHtml = '';
        if (isCancelled) {
            timelineHtml = `
                <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:1.5rem;color:var(--danger);">
                    <i class="fas fa-ban fa-2x"></i>
                    <div>
                        <div style="font-weight:700;">Đơn hàng đã bị hủy</div>
                        <div style="font-size:0.8rem;color:var(--dark-400);margin-top:2px;">${o.ly_do_huy ? 'Lý do: ' + o.ly_do_huy : ''}</div>
                    </div>
                </div>`;
        } else {
            const currentIdx = STEPS.findIndex(s => s.key === o.trang_thai);
            timelineHtml = `<div class="timeline">` + STEPS.map((step, idx) => {
                let cls = 'tl-step';
                if (idx < currentIdx) cls += ' done';
                else if (idx === currentIdx) cls += ' current';
                return `
                    <div class="${cls}">
                        <div class="tl-icon"><i class="fas ${step.icon}"></i></div>
                        <div class="tl-label">${step.label}</div>
                    </div>`;
            }).join('') + `</div>`;
        }

        // ─── Finance Breakdown ────────────────────────────
        const tienHang    = parseFloat(o.tien_hang || 0);
        const phiShip     = parseFloat(o.phi_van_chuyen || 0);
        const thueVat     = parseFloat(o.thue_vat || Math.round(tienHang * 0.08));
        const phiAdmin    = parseFloat(o.phi_admin || Math.round(tienHang * 0.15));
        const tongThu     = tienHang + phiShip;
        const doanhThuNet = tienHang - phiAdmin - thueVat; // Doanh thu thực nhận (sau phí admin và thuế VAT)

        // ─── Product items ────────────────────────────────
        const productsHtml = items.map(item => `
            <div class="product-item">
                <img src="${getProductImage(item.hinh_anh)}" alt="${item.ten_san_pham}">
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:600;color:var(--dark-100);font-size:0.9rem;margin-bottom:4px;">${item.ten_san_pham}</div>
                    ${item.ten_bien_the ? `<span style="display:inline-block;padding:2px 10px;background:var(--dark-700);border-radius:10px;font-size:0.75rem;color:var(--primary-light);">${item.ten_bien_the}</span>` : ''}
                </div>
                <div style="text-align:right;flex-shrink:0;">
                    <div style="color:var(--dark-400);font-size:0.8rem;">x${item.so_luong}</div>
                    <div style="font-weight:700;color:var(--danger);font-size:0.95rem;">${formatPrice(item.gia * item.so_luong)}</div>
                </div>
            </div>`).join('');

        // ─── Action buttons ───────────────────────────────
        let actionsHtml = '';
        if (o.trang_thai === 'cho_xac_nhan') {
            actionsHtml = `
                <button class="btn btn-primary" onclick="updateStatus('da_xac_nhan')"><i class="fas fa-check-circle"></i> Xác nhận đơn</button>
                <button class="btn btn-danger" onclick="openCancelModal()"><i class="fas fa-ban"></i> Hủy đơn</button>`;
        } else if (o.trang_thai === 'da_xac_nhan') {
            actionsHtml = `
                <button class="btn btn-primary" onclick="updateStatus('dang_giao')"><i class="fas fa-truck"></i> Bắt đầu giao hàng</button>
                <button class="btn btn-danger" onclick="openCancelModal()"><i class="fas fa-ban"></i> Hủy đơn</button>`;
        } else if (o.trang_thai === 'dang_giao') {
            actionsHtml = `<button class="btn btn-success" onclick="updateStatus('hoan_thanh')"><i class="fas fa-box-open"></i> Xác nhận hoàn thành</button>`;
        }

        // ─── Payment method label ─────────────────────────
        const payLabels = { cod: '💵 Tiền mặt (COD)', payos: '💳 Thanh toán online (PayOS)', momo: '🟣 MoMo' };
        const payLabel = payLabels[o.phuong_thuc_thanh_toan] || o.phuong_thuc_thanh_toan;

        // ─── Render page ──────────────────────────────────
        document.getElementById('detail-content').innerHTML = `
            <!-- Header card -->
            <div class="glass-card" style="padding:1.5rem;margin-bottom:1.25rem;">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
                    <div>
                        <h1 style="font-size:1.4rem;margin-bottom:6px;">Đơn hàng #${o.id}</h1>
                        <div style="font-size:0.8rem;color:var(--dark-400);">
                            <i class="fas fa-calendar-alt"></i> Đặt lúc: ${formatDate(o.ngay_tao)}
                            ${o.ma_giao_dich ? ` &nbsp;·&nbsp; <i class="fas fa-hashtag"></i> Mã GD: <code style="background:var(--dark-700);padding:2px 6px;border-radius:4px;">${o.ma_giao_dich}</code>` : ''}
                        </div>
                    </div>
                    <span class="status-badge" style="background:${status.bg};color:${status.color};">
                        <i class="fas ${status.icon}"></i> ${status.label}
                    </span>
                </div>
            </div>

            <!-- Timeline -->
            <div class="glass-card" style="padding:0.5rem 1rem;margin-bottom:1.25rem;">
                <div style="padding:1rem 0 0.25rem;font-weight:700;color:var(--dark-300);font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;">
                    <i class="fas fa-route"></i> Tiến trình đơn hàng
                </div>
                ${timelineHtml}
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;">
                <!-- Thông tin khách hàng -->
                <div class="glass-card" style="padding:1.25rem;">
                    <h3 style="font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;color:var(--dark-400);margin-bottom:1rem;"><i class="fas fa-user"></i> Thông tin khách hàng</h3>
                    <div style="display:flex;flex-direction:column;gap:10px;font-size:0.88rem;">
                        <div style="display:flex;align-items:center;gap:10px;">
                            <i class="fas fa-user-circle" style="color:var(--primary);width:18px;"></i>
                            <span style="color:var(--dark-200);font-weight:600;">${o.ten_nguoi_mua || '—'}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <i class="fas fa-phone" style="color:var(--primary);width:18px;"></i>
                            <span>${o.so_dien_thoai || '—'}</span>
                        </div>
                        <div style="display:flex;align-items:flex-start;gap:10px;">
                            <i class="fas fa-map-marker-alt" style="color:var(--primary);width:18px;margin-top:2px;"></i>
                            <span style="line-height:1.5;">${o.dia_chi_giao || '—'}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <i class="fas fa-credit-card" style="color:var(--primary);width:18px;"></i>
                            <span>${payLabel}</span>
                        </div>
                        ${o.ghi_chu ? `<div style="display:flex;align-items:flex-start;gap:10px;margin-top:4px;padding:8px 10px;background:rgba(245,158,11,0.08);border-radius:8px;border-left:3px solid var(--warning);">
                            <i class="fas fa-sticky-note" style="color:var(--warning);width:18px;margin-top:2px;"></i>
                            <span style="color:var(--warning);font-style:italic;">${o.ghi_chu}</span>
                        </div>` : ''}
                    </div>
                </div>

                <!-- Tài chính đơn hàng -->
                <div class="glass-card" style="padding:1.25rem;">
                    <h3 style="font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;color:var(--dark-400);margin-bottom:1rem;"><i class="fas fa-calculator"></i> Phân tích tài chính</h3>
                    
                    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--dark-500);margin-bottom:8px;">Khách hàng thanh toán</div>
                    <div class="finance-row">
                        <span class="label"><i class="fas fa-tag" style="color:var(--primary-light);"></i> Tiền hàng</span>
                        <span class="value">${formatPrice(tienHang)}</span>
                    </div>
                    <div class="finance-row">
                        <span class="label"><i class="fas fa-truck" style="color:#60a5fa;"></i> Phí vận chuyển</span>
                        <span class="value">${formatPrice(phiShip)}</span>
                    </div>

                    <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--dark-500);margin:14px 0 8px;">Các khoản khấu trừ từ tiền hàng</div>
                    <div class="finance-row">
                        <span class="label"><i class="fas fa-percentage" style="color:#a78bfa;"></i> Phí sàn (15%)</span>
                        <span class="value" style="color:var(--danger);">-${formatPrice(phiAdmin)}</span>
                    </div>
                    <div class="finance-row">
                        <span class="label"><i class="fas fa-landmark" style="color:#f59e0b;"></i> Thuế VAT (8%)</span>
                        <span class="value" style="color:var(--danger);">-${formatPrice(thueVat)}</span>
                    </div>

                    <div class="finance-row total">
                        <span class="label"><i class="fas fa-wallet"></i> Bạn nhận được</span>
                        <span class="value">${formatPrice(doanhThuNet)}</span>
                    </div>
                </div>
            </div>

            <!-- Danh sách sản phẩm -->
            <div class="glass-card" style="padding:1.25rem;margin-bottom:1.25rem;">
                <h3 style="font-size:0.85rem;text-transform:uppercase;letter-spacing:1px;color:var(--dark-400);margin-bottom:1rem;"><i class="fas fa-boxes"></i> Sản phẩm trong đơn (${items.length})</h3>
                ${productsHtml}
                <div style="display:flex;justify-content:flex-end;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--dark-700);">
                    <div style="text-align:right;">
                        <div style="font-size:0.8rem;color:var(--dark-400);margin-bottom:4px;">Tổng tiền khách thanh toán</div>
                        <div style="font-family:'Outfit';font-size:1.5rem;font-weight:800;color:var(--danger);">${formatPrice(parseFloat(o.tong_tien || 0))}</div>
                    </div>
                </div>
            </div>

            <!-- Action bar -->
            ${actionsHtml ? `
            <div class="glass-card action-bar">
                <span style="font-size:0.85rem;color:var(--dark-400);"><i class="fas fa-tools"></i> Thao tác:</span>
                ${actionsHtml}
                <div style="flex:1;"></div>
                <a href="tel:${o.so_dien_thoai}" class="btn btn-outline btn-sm"><i class="fas fa-phone"></i> Gọi khách</a>
                <a href="/pages/seller/chat.html?userId=${o.nguoi_mua_id}&name=${encodeURIComponent(o.ten_nguoi_mua || 'Khách hàng')}" class="btn btn-outline btn-sm"><i class="fas fa-comments"></i> Nhắn tin</a>
            </div>` : `
            <div class="glass-card action-bar" style="justify-content:flex-end;">
                <a href="tel:${o.so_dien_thoai}" class="btn btn-outline btn-sm"><i class="fas fa-phone"></i> Gọi khách</a>
                <a href="/pages/seller/chat.html?userId=${o.nguoi_mua_id}&name=${encodeURIComponent(o.ten_nguoi_mua || 'Khách hàng')}" class="btn btn-outline btn-sm"><i class="fas fa-comments"></i> Nhắn tin</a>
            </div>`}

            <!-- Cancel Modal -->
            <div id="cancelModal" class="modal-backdrop">
                <div class="modal-box">
                    <h3><i class="fas fa-ban" style="color:var(--danger);"></i> Hủy đơn hàng #${o.id}</h3>
                    <p style="font-size:0.85rem;color:var(--dark-400);margin-bottom:12px;">Vui lòng nhập lý do hủy đơn. Thao tác này không thể hoàn tác.</p>
                    <textarea id="cancelReason" placeholder="Nhập lý do hủy..." rows="3"></textarea>
                    <div class="actions">
                        <button class="btn btn-outline btn-sm" onclick="closeCancelModal()">Hủy bỏ</button>
                        <button class="btn btn-danger btn-sm" onclick="confirmCancel()"><i class="fas fa-ban"></i> Xác nhận hủy</button>
                    </div>
                </div>
            </div>
        `;

        // Thêm modal style
        document.querySelector('.modal-backdrop') && (document.querySelector('.modal-backdrop').style.display = 'none');
    }

    async function updateStatus(newStatus) {
        const labels = { da_xac_nhan:'xác nhận đơn hàng', dang_giao:'chuyển sang đang giao', hoan_thanh:'đánh dấu hoàn thành' };
        if (!confirm(`Bạn muốn ${labels[newStatus]}?`)) return;
        const r = await api.put(`/orders/${orderId}/status`, { trang_thai: newStatus });
        if (r.success) { showToast('Cập nhật thành công!'); loadOrderDetail(); }
        else showToast(r.message || 'Lỗi cập nhật', 'error');
    }

    function openCancelModal() {
        document.getElementById('cancelModal').style.display = 'flex';
    }
    function closeCancelModal() {
        document.getElementById('cancelModal').style.display = 'none';
    }
    async function confirmCancel() {
        const reason = document.getElementById('cancelReason').value.trim();
        if (!reason) { showToast('Vui lòng nhập lý do hủy', 'error'); return; }
        const r = await api.put(`/orders/${orderId}/status`, { trang_thai: 'da_huy', ly_do_huy: reason });
        if (r.success) { showToast('Đã hủy đơn hàng'); closeCancelModal(); loadOrderDetail(); }
        else showToast(r.message || 'Lỗi hủy đơn', 'error');
    }

    // Init
    loadShopInfo();
    loadOrderDetail();

    // Expose modal css class via style tag
    const style = document.createElement('style');
    style.textContent = `.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 9999; align-items: center; justify-content: center; padding: 1rem; } .modal-backdrop[style*="flex"] { display: flex !important; } .modal-box { width: 100%; max-width: 440px; border-radius: 16px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); padding: 1.75rem; color: #f1f5f9; box-shadow: 0 20px 50px rgba(0,0,0,0.5); } .modal-box h3 { font-size: 1.1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; } .modal-box textarea { width: 100%; min-height: 90px; padding: 10px 12px; background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.1); color: #f1f5f9; border-radius: 10px; resize: vertical; font-family: inherit; font-size: 0.9rem; } .modal-box textarea:focus { outline: none; border-color: var(--primary); } .modal-box .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }`;
    document.head.appendChild(style);
    </script>
</body>
</html>
