<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="shopee-navbar">
        <!-- Top Bar -->
        <div class="shopee-topbar">
            <div class="navbar-container">
                <div class="topbar-left">
                </div>
                <div class="topbar-right">
                    <div class="topbar-notifications">
                        <a href="#" class="topbar-link" id="notifications-btn" onclick="toggleNotifications()">
                            <i class="fas fa-bell"></i> Thông Báo
                            <span class="notification-badge" id="notification-count" style="display: none;">0</span>
                        </a>
                        <div class="notifications-dropdown" id="notifications-dropdown">
                            <div class="notifications-header">
                                <h4>Thông báo</h4>
                                <a href="/pages/profile.html#notifications" class="view-all-link">Xem tất cả</a>
                            </div>
                            <div class="notifications-list" id="navbar-notifications-list">
                                <!-- Notifications will be loaded here -->
                            </div>
                        </div>
                    </div>
                    <a href="/pages/support.html" class="topbar-link"><i class="fas fa-question-circle"></i> Hỗ Trợ</a>
                    <div class="topbar-user" id="topbar-user">
                        <!-- Sẽ được load động -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Navbar -->
        <div class="shopee-main-nav">
            <div class="navbar-container">
                <a href="/" class="shopee-logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Vipo</span>
                </a>
                
                <div class="shopee-search">
                    <div class="search-box" style="position:relative;">
                        <input type="text" id="search-input" placeholder="Tìm sản phẩm, thương hiệu và tên shop" onkeypress="if(event.key==='Enter') searchProducts()" autocomplete="off">
                        <button class="search-btn" onclick="searchProducts()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div class="shopee-actions">
                    <a href="/pages/cart.html" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header"><h1><i class="fas fa-box"></i> Đơn hàng của tôi</h1></div>
        <div class="glass" style="padding:12px 16px;margin-bottom:1.5rem;display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-sm filter-btn active" onclick="filterOrders('')" data-f="">Tất cả</button>
            <button class="btn btn-sm filter-btn" onclick="filterOrders('cho_xac_nhan')" data-f="cho_xac_nhan">Chờ xác nhận</button>
            <button class="btn btn-sm filter-btn" onclick="filterOrders('da_xac_nhan')" data-f="da_xac_nhan">Đã xác nhận</button>
            <button class="btn btn-sm filter-btn" onclick="filterOrders('dang_giao')" data-f="dang_giao">Đang giao</button>
            <button class="btn btn-sm filter-btn" onclick="filterOrders('hoan_thanh')" data-f="hoan_thanh">Hoàn thành</button>
            <button class="btn btn-sm filter-btn" onclick="filterOrders('da_huy')" data-f="da_huy">Đã hủy</button>
        </div>
        <div id="orders-list"><div class="spinner" style="margin:3rem auto;"></div></div>
    </div>

    <style>.filter-btn{background:var(--dark-800);color:var(--dark-400);border:1px solid var(--dark-700);}.filter-btn.active,.filter-btn:hover{background:var(--primary);color:white;border-color:var(--primary);} .order-card-link{transition:transform 0.2s, box-shadow 0.2s, border-color 0.2s;} .order-card-link:hover{transform:translateY(-2px); border-color:var(--primary) !important; box-shadow:0 8px 20px rgba(99,102,241,0.2);}</style>

    <script src="/js/api.js"></script>
    <script>
    if(!isLoggedIn()) location.href='/pages/login.html';
    let currentFilter = '';

    async function filterOrders(status) {
        currentFilter = status;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === status));
        const el = document.getElementById('orders-list');
        el.innerHTML = '<div class="spinner" style="margin:3rem auto;"></div>';

        const q = status ? `?trang_thai=${status}` : '';
        const r = await api.get(`/orders${q}`);

        if(!r.success || r.data.length === 0) {
            el.innerHTML = '<div class="glass-card" style="padding:3rem;text-align:center;"><i class="fas fa-box-open" style="font-size:3rem;color:var(--dark-600);margin-bottom:1rem;"></i><p style="color:var(--dark-400);">Không có đơn hàng nào</p></div>';
            return;
        }

        el.innerHTML = r.data.map(o => `
        <a href="/pages/order-detail.html?id=${o.id}" class="glass-card order-card-link" style="display:block;padding:1.5rem;margin-bottom:1rem;cursor:pointer;text-decoration:none;color:inherit;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <div>
                    <span style="font-size:0.8rem;color:var(--dark-400);">Mã đơn: #${o.id}</span>
                    <span style="margin-left:12px;" class="status ${getStatusClass(o.trang_thai)}">${getStatusLabel(o.trang_thai)}</span>
                </div>
                <span style="font-size:0.8rem;color:var(--dark-500);">${formatDate(o.ngay_tao)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <i class="fas fa-store" style="color:var(--primary-light);"></i> <strong>${o.ten_gian_hang}</strong>
                    <span style="font-size:0.8rem;color:var(--dark-400);margin-left:8px;">${o.so_san_pham} sản phẩm</span>
                </div>
                <div style="text-align:right;">
                    <div style="font-family:'Outfit';font-size:1.1rem;font-weight:700;color:var(--danger);">${formatPrice(o.tong_tien)}</div>
                    <div style="font-size:0.75rem;color:${o.trang_thai_thanh_toan==='paid'?'var(--success)':'var(--warning)'}">
                        ${o.trang_thai_thanh_toan==='paid'?'✓ Đã thanh toán':'○ Chưa thanh toán'}
                    </div>
                </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.75rem;padding-top:0.75rem;border-top:1px dashed var(--dark-700);">
                <div>
                    ${['da_giao','hoan_thanh','da_huy'].includes(o.trang_thai) ? `<button class="btn btn-sm btn-primary" onclick="rebuyOrder(event, ${o.id})"><i class="fas fa-redo"></i> Mua lại</button>` : ''}
                </div>
                <span style="font-size:0.8rem;color:var(--primary-light);"><i class="fas fa-chevron-right"></i> Xem chi tiết</span>
            </div>
        </a>`).join('');
    }

    async function rebuyOrder(e, orderId) {
        e.preventDefault(); // Ngăn chuyển trang Xem chi tiết
        const btn = e.currentTarget;
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
        
        const r = await api.post(`/orders/${orderId}/rebuy`);
        if (r.success) {
            showToast(r.message, 'success');
            setTimeout(() => location.href = '/pages/cart.html', 1500);
        } else {
            showToast(r.message, 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-redo"></i> Mua lại';
        }
    }

    filterOrders('');
    </script>
<script src="/js/shopee-nav.js"></script>
</body>
</html>
