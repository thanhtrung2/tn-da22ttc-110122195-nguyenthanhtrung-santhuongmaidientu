<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thành công - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-color: var(--dark-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }

        .success-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .success-icon-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
            opacity: 0.2;
        }

        .success-icon {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.5);
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: scale(0);
        }

        @keyframes scaleIn {
            to { transform: scale(1); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .success-title {
            color: #f8fafc;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.3s forwards;
        }

        .success-desc {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 9999px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: fadeIn 0.5s ease 0.5s forwards;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            border: none;
            cursor: pointer;
        }

        .btn-back::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.6);
        }

        .btn-back:hover::before {
            left: 100%;
        }

        .btn-back i {
            transition: transform 0.3s ease;
        }

        .btn-back:hover i {
            transform: translateX(-5px);
        }

        /* Confetti effect */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: confettiFall linear forwards;
            z-index: 1;
        }

        @keyframes confettiFall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon-wrapper">
            <div class="success-icon-bg"></div>
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
        </div>
        
        <h1 class="success-title">Thanh toán thành công!</h1>
        <p class="success-desc">Cảm ơn bạn đã mua sắm tại Vipo. Đơn hàng của bạn đã được thanh toán và đang được xử lý.</p>
        
        <a href="/pages/orders.html" class="btn-back">
            <i class="fas fa-arrow-left"></i>
            Quay lại đơn hàng
        </a>
    </div>

    <script>
        // Confetti animation generator
        const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
        
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Randomize properties
                const left = Math.random() * 100 + 'vw';
                const bg = colors[Math.floor(Math.random() * colors.length)];
                const animDuration = Math.random() * 3 + 2 + 's';
                const animDelay = Math.random() * 2 + 's';
                
                confetti.style.left = left;
                confetti.style.backgroundColor = bg;
                confetti.style.animationDuration = animDuration;
                confetti.style.animationDelay = animDelay;
                
                // Random shapes
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                document.body.appendChild(confetti);
            }
        }

        // Run when page loads
        window.addEventListener('load', createConfetti);
    </script>
</body>
</html>
