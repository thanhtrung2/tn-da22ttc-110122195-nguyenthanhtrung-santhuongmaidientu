<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <nav class="shopee-navbar">
        <!-- Top Bar -->
        <div class="shopee-topbar">
            <div class="navbar-container">
                <div class="topbar-left">
                </div>
                <div class="topbar-right">
                    <div class="topbar-notifications">
                        <a href="#" class="topbar-link" id="notifications-btn" onclick="toggleNotifications()">
                            <i class="fas fa-bell"></i> Thông Báo
                            <span class="notification-badge" id="notification-count" style="display: none;">0</span>
                        </a>
                        <div class="notifications-dropdown" id="notifications-dropdown">
                            <div class="notifications-header">
                                <h4>Thông báo</h4>
                                <a href="/pages/profile.html#notifications" class="view-all-link">Xem tất cả</a>
                            </div>
                            <div class="notifications-list" id="navbar-notifications-list">
                                <!-- Notifications will be loaded here -->
                            </div>
                        </div>
                    </div>
                    <a href="#" class="topbar-link"><i class="fas fa-question-circle"></i> Hỗ Trợ</a>
                    <div class="topbar-user" id="topbar-user">
                        <!-- Sẽ được load động -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Navbar -->
        <div class="shopee-main-nav">
            <div class="navbar-container">
                <a href="/" class="shopee-logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Vipo</span>
                </a>
                
                <div class="shopee-search">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Tìm sản phẩm, thương hiệu và tên shop" onkeypress="if(event.key==='Enter') searchProducts()">
                        <button class="search-btn" onclick="searchProducts()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div class="shopee-actions">
                    <a href="/pages/cart.html" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-container" style="padding-top:80px;">
        <div class="glass" style="height:calc(100vh - 110px);display:grid;grid-template-columns:300px 1fr;overflow:hidden;border-radius:20px;">
            <!-- Contacts -->
            <div style="border-right:1px solid var(--glass-border);display:flex;flex-direction:column;">
                <div style="padding:16px;border-bottom:1px solid var(--dark-700);">
                    <h3 style="font-size:1.1rem;"><i class="fas fa-comments"></i> Tin nhắn</h3>
                </div>
                <div id="contacts" style="flex:1;overflow-y:auto;padding:8px;"></div>
            </div>
            <!-- Chat Area -->
            <div style="display:flex;flex-direction:column;" id="chat-area">
                <div style="padding:16px;border-bottom:1px solid var(--dark-700);display:flex;align-items:center;gap:10px;" id="chat-header">
                    <p style="color:var(--dark-400);text-align:center;width:100;">Chọn một cuộc trò chuyện</p>
                </div>
                <div id="messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;"></div>
                <div style="padding:12px 16px;border-top:1px solid var(--dark-700);display:none;gap:8px;" id="chat-input">
                    <input type="text" id="msg-input" class="form-control" style="border-radius:24px;" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button class="btn btn-primary btn-icon" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
    if(!isLoggedIn()) location.href='/pages/login.html';

    const socket = io({ auth: { token: getToken() } });
    const me = getUser();
    let currentChat = null;
    let onlineSet = new Set();

    socket.on('connect', () => { socket.emit('get_online_users'); });
    socket.on('online_users', list => { onlineSet = new Set(list); renderContacts(); });
    socket.on('user_online', d => { onlineSet.add(d.userId); renderContacts(); });
    socket.on('user_offline', d => { onlineSet.delete(d.userId); renderContacts(); });

    socket.on('new_message', msg => {
        if(currentChat == msg.nguoi_gui_id) {
            appendMsg(msg, false);
            socket.emit('mark_read', { nguoi_gui_id: msg.nguoi_gui_id });
        }
        loadConversations();
    });

    socket.on('message_sent', msg => appendMsg(msg, true));
    socket.on('user_typing', d => {
        if(currentChat == d.userId) {
            document.getElementById('typing-indicator').style.display = d.typing ? 'block' : 'none';
        }
    });

    let conversations = [];
    async function loadConversations() {
        const r = await api.get('/chat/conversations');
        if(r.success) { conversations = r.data; renderContacts(); }
    }

    function renderContacts() {
        const el = document.getElementById('contacts');
        if(conversations.length === 0) {
            el.innerHTML = '<p style="text-align:center;color:var(--dark-500);padding:2rem;font-size:0.85rem;">Chưa có cuộc trò chuyện</p>';
            return;
        }
        el.innerHTML = conversations.map(c => `
        <div onclick="openChat(${c.user_id},'${c.ho_ten}')" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;cursor:pointer;transition:all 0.2s;${currentChat==c.user_id?'background:rgba(99,102,241,0.15);':''}" onmouseover="this.style.background='var(--dark-700)'" onmouseout="this.style.background='${currentChat==c.user_id?'rgba(99,102,241,0.15)':'transparent'}'">
            <div style="position:relative;width:40px;height:40px;border-radius:50%;background:var(--dark-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <i class="fas fa-user" style="color:var(--dark-400);"></i>
                ${onlineSet.has(c.user_id)?'<div style="position:absolute;bottom:0;right:0;width:10px;height:10px;background:var(--success);border-radius:50%;border:2px solid var(--dark-800);"></div>':''}
            </div>
            <div style="flex:1;min-width:0;">
                <div style="font-weight:600;font-size:0.85rem;color:var(--white);">${c.ho_ten}</div>
                <div style="font-size:0.75rem;color:var(--dark-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.last_message||''}</div>
            </div>
            ${c.unread > 0 ? `<span style="background:var(--danger);color:white;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;">${c.unread}</span>` : ''}
        </div>`).join('');
    }

    async function openChat(userId, name) {
        currentChat = userId;
        document.getElementById('chat-header').innerHTML = `
            <div style="width:36px;height:36px;border-radius:50%;background:var(--dark-700);display:flex;align-items:center;justify-content:center;">
                <i class="fas fa-user" style="color:var(--dark-400);"></i>
            </div>
            <div><strong style="font-size:0.9rem;">${name}</strong>
            <div style="font-size:0.7rem;color:${onlineSet.has(userId)?'var(--success)':'var(--dark-500)'};">${onlineSet.has(userId)?'Đang hoạt động':'Không hoạt động'}</div></div>`;
        document.getElementById('chat-input').style.display = 'flex';

        const r = await api.get(`/chat/messages/${userId}`);
        const el = document.getElementById('messages');
        el.innerHTML = '<div id="typing-indicator" style="display:none;font-size:0.75rem;color:var(--dark-400);padding:4px 10px;"><i class="fas fa-circle-notch fa-spin"></i> Đang nhập...</div>';

        if(r.success) {
            r.data.forEach(msg => appendMsg(msg, msg.nguoi_gui_id === me.id));
        }
        el.scrollTop = el.scrollHeight;
        renderContacts();
        socket.emit('mark_read', { nguoi_gui_id: userId });
    }

    function appendMsg(msg, isMine) {
        const el = document.getElementById('messages');
        const typing = document.getElementById('typing-indicator');
        const div = document.createElement('div');
        div.className = `chat-msg ${isMine ? 'user' : 'bot'}`;
        div.textContent = msg.noi_dung;
        el.insertBefore(div, typing);
        el.scrollTop = el.scrollHeight;
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const msg = input.value.trim();
        if(!msg || !currentChat) return;
        socket.emit('send_message', { nguoi_nhan_id: currentChat, noi_dung: msg });
        input.value = '';
    }

    // Auto-open chat if userId in URL
    const urlUid = new URLSearchParams(location.search).get('userId');
    if(urlUid) {
        (async () => {
            await loadConversations();
            // If no existing conversation, send a greeting first
            const existing = conversations.find(c => c.user_id == urlUid);
            if(existing) openChat(existing.user_id, existing.ho_ten);
            else {
                // Get user name
                openChat(parseInt(urlUid), 'Người bán');
            }
        })();
    } else {
        loadConversations();
    }
    </script>
<script src="/js/shopee-nav.js"></script>
</body>
</html>
