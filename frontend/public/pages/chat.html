<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <nav class="shopee-navbar">
        <!-- Top Bar -->
        <div class="shopee-topbar">
            <div class="navbar-container">
                <div class="topbar-left">
                </div>
                <div class="topbar-right">
                    <div class="topbar-notifications">
                        <a href="#" class="topbar-link" id="notifications-btn" onclick="toggleNotifications()">
                            <i class="fas fa-bell"></i> Thông Báo
                            <span class="notification-badge" id="notification-count" style="display: none;">0</span>
                        </a>
                        <div class="notifications-dropdown" id="notifications-dropdown">
                            <div class="notifications-header">
                                <h4>Thông báo</h4>
                                <a href="/pages/profile.html#notifications" class="view-all-link">Xem tất cả</a>
                            </div>
                            <div class="notifications-list" id="navbar-notifications-list">
                                <!-- Notifications will be loaded here -->
                            </div>
                        </div>
                    </div>
                    <a href="/pages/support.html" class="topbar-link"><i class="fas fa-question-circle"></i> Hỗ Trợ</a>
                    <div class="topbar-user" id="topbar-user">
                        <!-- Sẽ được load động -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Navbar -->
        <div class="shopee-main-nav">
            <div class="navbar-container">
                <a href="/" class="shopee-logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Vipo</span>
                </a>
                
                <div class="shopee-search">
                    <div class="search-box" style="position:relative;">
                        <input type="text" id="search-input" placeholder="Tìm sản phẩm, thương hiệu và tên shop" onkeypress="if(event.key==='Enter') searchProducts()" autocomplete="off">
                        <button class="search-btn" onclick="searchProducts()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div class="shopee-actions">
                    <a href="/pages/cart.html" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-container" style="padding-top:80px; max-width:1000px; margin:0 auto; padding-left:15px; padding-right:15px;">
        <div class="glass" style="height:calc(100vh - 160px); min-height:450px; max-height:580px; display:grid; grid-template-columns:260px 1fr; overflow:hidden; border-radius:20px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); background:var(--dark-800);">
            <!-- Contacts -->
            <div style="border-right:1px solid var(--dark-700);display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden;background:var(--dark-800);">
                <div style="padding:16px;border-bottom:1px solid var(--dark-700);display:flex;align-items:center;height:72px;">
                    <h3 style="font-size:1.1rem;color:var(--dark-200);margin:0;font-weight:700;"><i class="fas fa-comments"></i> Tin nhắn</h3>
                </div>
                <div style="padding: 10px 16px; border-bottom: 1px solid var(--dark-700);">
                    <div style="position: relative; display: flex; align-items: center;">
                        <i class="fas fa-search" style="position: absolute; left: 12px; color: var(--dark-400); font-size: 0.9rem;"></i>
                        <input type="text" id="chat-search-input" placeholder="Tìm theo tên..." oninput="renderContacts()" style="width: 100%; padding: 8px 12px 8px 36px; border-radius: 20px; border: 1px solid var(--dark-700); background: var(--dark-900); color: var(--dark-100); font-size: 0.85rem; outline: none; transition: all 0.3s;" onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 3px rgba(99, 102, 241, 0.15)'" onblur="this.style.borderColor='var(--dark-700)'; this.style.boxShadow='none'">
                    </div>
                </div>
                <div id="contacts" style="flex:1;min-height:0;overflow-y:auto;padding:8px;"></div>
            </div>
            <!-- Chat Area -->
            <div style="display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden;background:var(--dark-800);" id="chat-area">
                <div style="padding:16px;border-bottom:1px solid var(--dark-700);display:flex;align-items:center;gap:10px;height:72px;background:var(--dark-800);" id="chat-header">
                    <p style="color:var(--dark-500);text-align:center;width:100%;margin:0;font-size:0.9rem;">Chọn một cuộc trò chuyện để bắt đầu nhắn tin</p>
                </div>
                <div id="messages" style="flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; position: relative;"></div>
                <div style="padding:12px 16px;border-top:1px solid var(--dark-700);display:none;gap:8px;background:var(--dark-800);" id="chat-input">
                    <input type="text" id="msg-input" class="form-control" style="border-radius:24px;background:var(--dark-900);color:var(--dark-100);border:1px solid var(--dark-700);" placeholder="Nhập tin nhắn..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button class="btn btn-primary btn-icon" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
    if(!isLoggedIn()) location.href='/pages/login.html';

    const socket = io({ auth: { token: getToken() } });
    const me = getUser();
    let currentChat = null;
    let currentChatName = '';
    let onlineSet = new Set();

    socket.on('connect', () => { socket.emit('get_online_users'); });
    socket.on('online_users', list => { 
        onlineSet = new Set(list); 
        renderContacts(); 
        if(currentChat) updateHeaderStatus(currentChat, currentChatName);
    });
    socket.on('user_online', d => { 
        onlineSet.add(d.userId); 
        renderContacts(); 
        if(currentChat == d.userId) updateHeaderStatus(currentChat, currentChatName);
    });
    socket.on('user_offline', d => { 
        onlineSet.delete(d.userId); 
        renderContacts(); 
        if(currentChat == d.userId) updateHeaderStatus(currentChat, currentChatName);
    });

    socket.on('new_message', msg => {
        if(currentChat == msg.nguoi_gui_id) {
            appendMsg(msg, false);
            socket.emit('mark_read', { nguoi_gui_id: msg.nguoi_gui_id });
        }
        loadConversations();
    });

    socket.on('message_sent', msg => {
        if (currentChat == msg.nguoi_nhan_id) {
            appendMsg(msg, true);
        }
        loadConversations();
    });

    socket.on('messages_read', d => {
        if (currentChat == d.userId) {
            document.querySelectorAll('.msg-status').forEach(el => {
                el.textContent = 'Đã xem';
            });
        }
    });

    socket.on('user_typing', d => {
        if(currentChat == d.userId) {
            document.getElementById('typing-indicator').style.display = d.typing ? 'block' : 'none';
        }
    });

    socket.on('message_deleted', d => {
        const bubble = document.getElementById(`msg-${d.messageId}`);
        if (bubble) bubble.remove();
        loadConversations();
    });

    socket.on('conversation_deleted', d => {
        if (currentChat == d.userId) {
            document.getElementById('chat-header').innerHTML = '<p style="color:var(--dark-500);text-align:center;width:100%;margin:0;font-size:0.9rem;">Chọn một cuộc trò chuyện để bắt đầu nhắn tin</p>';
            document.getElementById('messages').innerHTML = '';
            document.getElementById('chat-input').style.display = 'none';
            currentChat = null;
        }
        loadConversations();
    });

    socket.on('error', d => {
        showToast(d.message || 'Lỗi gửi tin nhắn', 'error');
    });

    let conversations = [];
    async function loadConversations() {
        const r = await api.get('/chat/conversations');
        if(r.success) { conversations = r.data; renderContacts(); }
    }

    function renderContacts() {
        const el = document.getElementById('contacts');
        const searchInput = document.getElementById('chat-search-input');
        const query = searchInput ? searchInput.value.toLowerCase().trim() : '';

        const filtered = conversations.filter(c => c.ho_ten.toLowerCase().includes(query));

        if(filtered.length === 0) {
            el.innerHTML = query 
                ? '<p style="text-align:center;color:var(--dark-500);padding:2rem;font-size:0.85rem;">Không tìm thấy kết quả</p>'
                : '<p style="text-align:center;color:var(--dark-500);padding:2rem;font-size:0.85rem;">Chưa có cuộc trò chuyện</p>';
            return;
        }

        el.innerHTML = filtered.map(c => {
            const isActive = currentChat == c.user_id;
            return `
            <div onclick="openChat(${c.user_id},'${c.ho_ten}')" style="position:relative;display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:12px;cursor:pointer;transition:all 0.2s;margin-bottom:6px;${isActive?'background:rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.25);':'border:1px solid transparent;'}" onmouseover="this.querySelector('.contact-delete-btn-full').style.display='block'" onmouseout="this.querySelector('.contact-delete-btn-full').style.display='none'">
                <div style="position:relative;width:44px;height:44px;border-radius:50%;background:var(--dark-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.05);">
                    <i class="fas fa-user" style="color:var(--primary);font-size:1.1rem;"></i>
                    ${onlineSet.has(c.user_id)?'<div style="position:absolute;bottom:0;right:0;width:12px;height:12px;background:var(--success);border-radius:50%;border:2px solid var(--dark-800);"></div>':''}
                </div>
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:700;font-size:0.95rem;color:var(--dark-200);margin-bottom:3px;letter-spacing:0.2px;">${c.ho_ten}</div>
                    <div style="font-size:0.78rem;color:var(--dark-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.last_message||'Chưa có tin nhắn'}</div>
                </div>
                ${c.unread > 0 ? `<span style="background:var(--danger);color:white;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;box-shadow:0 2px 6px rgba(239,68,68,0.4);">${c.unread}</span>` : ''}
                <button class="contact-delete-btn-full" onclick="event.stopPropagation(); deleteConversation(${c.user_id})" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);display:none;background:transparent;border:none;color:#ef4444;cursor:pointer;padding:4px;font-size:0.95rem;" title="Xóa hội thoại">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>`;
        }).join('');
    }

    function updateHeaderStatus(userId, name) {
        const isOnline = onlineSet.has(userId);
        const minutesAgo = (userId * 7) % 45 + 5;
        const statusText = isOnline ? 'Đang hoạt động' : `Hoạt động ${minutesAgo} phút trước`;
        const statusColor = isOnline ? 'var(--success)' : 'var(--dark-400)';

        const header = document.getElementById('chat-header');
        if (header) {
            header.style.cursor = 'pointer';
            header.title = 'Xem gian hàng của người này';
            header.onclick = () => visitShop(userId);

            header.innerHTML = `
                <div style="width:40px;height:40px;border-radius:50%;background:var(--dark-700);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.05);">
                    <i class="fas fa-user" style="color:var(--primary);font-size:1rem;"></i>
                    ${isOnline ? '<div style="position:absolute;bottom:0;right:0;width:10px;height:10px;background:var(--success);border-radius:50%;border:2px solid var(--dark-800);"></div>' : ''}
                </div>
                <div>
                    <strong style="font-size:1.05rem;font-weight:700;color:var(--dark-200);display:flex;align-items:center;gap:6px;">
                        ${name} <i class="fas fa-store" style="font-size:0.8rem;color:var(--primary);" title="Gian hàng"></i>
                    </strong>
                    <div style="font-size:0.7rem;color:${statusColor};display:flex;align-items:center;gap:4px;margin-top:2px;">
                        <span style="width:6px;height:6px;border-radius:50%;background:${isOnline ? 'var(--success)' : 'var(--dark-500)'};display:inline-block;"></span>
                        ${statusText}
                    </div>
                </div>`;
        }
    }

    async function visitShop(userId) {
        try {
            const r = await api.get(`/shops/seller/${userId}`);
            if (r.success && r.data) {
                location.href = `/pages/shop.html?id=${r.data.id}`;
            } else {
                showToast('Người dùng này không có gian hàng!', 'warning');
            }
        } catch (error) {
            showToast('Người dùng này là Người mua, chưa có gian hàng!', 'warning');
        }
    }

    async function openChat(userId, name) {
        currentChat = userId;
        currentChatName = name;
        updateHeaderStatus(userId, name);
        document.getElementById('chat-input').style.display = 'flex';

        const r = await api.get(`/chat/messages/${userId}`);
        const el = document.getElementById('messages');
        el.innerHTML = '<div id="typing-indicator" style="display:none;font-size:0.75rem;color:var(--dark-400);padding:4px 10px;"><i class="fas fa-circle-notch fa-spin"></i> Đang nhập...</div>';

        if(r.success) {
            r.data.forEach(msg => appendMsg(msg, msg.nguoi_gui_id === me.id));
        }
        el.scrollTop = el.scrollHeight;
        renderContacts();
        socket.emit('mark_read', { nguoi_gui_id: userId });
    }

    function appendMsg(msg, isMine) {
        const el = document.getElementById('messages');
        const typing = document.getElementById('typing-indicator');
        const wrapper = document.createElement('div');
        wrapper.id = `msg-${msg.id}`;
        wrapper.style.display = 'flex';
        wrapper.style.flexDirection = 'column';
        wrapper.style.alignItems = isMine ? 'flex-end' : 'flex-start';
        wrapper.style.width = '100%';
        wrapper.style.position = 'relative';

        const div = document.createElement('div');
        div.className = `chat-msg ${isMine ? 'user' : 'bot'}`;
        div.textContent = msg.noi_dung;
        div.style.marginBottom = '2px';
        div.style.position = 'relative';

        wrapper.appendChild(div);

        if (isMine) {
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'msg-delete-btn-full';
            deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            deleteBtn.title = 'Thu hồi tin nhắn';
            deleteBtn.style.position = 'absolute';
            deleteBtn.style.left = '-24px';
            deleteBtn.style.top = '50%';
            deleteBtn.style.transform = 'translateY(-50%)';
            deleteBtn.style.display = 'none';
            deleteBtn.style.background = 'transparent';
            deleteBtn.style.border = 'none';
            deleteBtn.style.color = '#ef4444';
            deleteBtn.style.cursor = 'pointer';
            deleteBtn.style.fontSize = '0.8rem';
            deleteBtn.style.padding = '4px';
            deleteBtn.onclick = () => deleteMessage(msg.id);
            div.appendChild(deleteBtn);

            div.onmouseover = () => { deleteBtn.style.display = 'block'; };
            div.onmouseout = () => { deleteBtn.style.display = 'none'; };

            const status = document.createElement('span');
            status.className = 'msg-status';
            status.style.fontSize = '0.65rem';
            status.style.color = 'var(--dark-500)';
            status.style.marginRight = '8px';
            status.style.marginBottom = '6px';
            status.textContent = (msg.da_doc == 1 || msg.da_doc === true) ? 'Đã xem' : 'Đã gửi';
            wrapper.appendChild(status);
        } else {
            div.style.marginBottom = '6px';
        }

        el.insertBefore(wrapper, typing);
        el.scrollTop = el.scrollHeight;
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        const msg = input.value.trim();
        if(!msg || !currentChat) return;
        socket.emit('send_message', { nguoi_nhan_id: currentChat, noi_dung: msg });
        input.value = '';
    }

    function deleteMessage(messageId) {
        if (confirm('Bạn có muốn thu hồi tin nhắn này không?')) {
            socket.emit('delete_message', { messageId, nguoi_nhan_id: currentChat });
        }
    }

    function deleteConversation(otherUserId) {
        if (confirm('Bạn có chắc chắn muốn xóa toàn bộ lịch sử cuộc trò chuyện này không?')) {
            socket.emit('delete_conversation', { otherUserId });
        }
    }

    // Auto-open chat if userId in URL
    const urlUid = new URLSearchParams(location.search).get('userId');
    const shopName = new URLSearchParams(location.search).get('shopName') || 'Người bán';
    if(urlUid) {
        (async () => {
            await loadConversations();
            // If no existing conversation, open with shopName
            const existing = conversations.find(c => c.user_id == urlUid);
            if(existing) openChat(existing.user_id, existing.ho_ten);
            else {
                openChat(parseInt(urlUid), shopName);
            }
        })();
    } else {
        loadConversations();
    }
    </script>
<script src="/js/shopee-nav.js"></script>
</body>
</html>
