<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gian hàng - Vipo</title>
    <meta name="description" content="Xem sản phẩm của gian hàng trên Vipo">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .shop-hero {
            background: linear-gradient(135deg, var(--dark-800) 0%, var(--dark-900) 100%);
            border: 1px solid var(--dark-700);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .shop-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(238,77,45,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .shop-avatar {
            width: 90px;
            height: 90px;
            border-radius: 16px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(238,77,45,0.3);
        }
        .shop-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid var(--dark-700);
            min-width: 100px;
        }
        .shop-stat strong { font-size: 1.3rem; font-weight: 800; color: var(--primary-light); }
        .shop-stat span { font-size: 0.75rem; color: var(--dark-400); margin-top: 2px; }

        .category-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 1rem 1.5rem;
            background: var(--dark-800);
            border-radius: 16px;
            border: 1px solid var(--dark-700);
            margin-bottom: 1.5rem;
        }
        .cat-tab {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--dark-600);
            background: transparent;
            color: var(--dark-300);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-tab:hover { border-color: var(--primary); color: var(--primary-light); }
        .cat-tab.active { background: var(--gradient-primary); border-color: transparent; color: white; font-weight: 600; }

        .filter-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            padding: 1rem 1.5rem;
            background: var(--dark-800);
            border-radius: 16px;
            border: 1px solid var(--dark-700);
            margin-bottom: 2rem;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="shopee-navbar">
        <div class="shopee-topbar">
            <div class="navbar-container">
                <div class="topbar-left"></div>
                <div class="topbar-right">
                    <div class="topbar-notifications">
                        <a href="#" class="topbar-link" id="notifications-btn" onclick="toggleNotifications()">
                            <i class="fas fa-bell"></i> Thông Báo
                            <span class="notification-badge" id="notification-count" style="display: none;">0</span>
                        </a>
                        <div class="notifications-dropdown" id="notifications-dropdown">
                            <div class="notifications-header">
                                <h4>Thông báo</h4>
                                <a href="/pages/profile.html#notifications" class="view-all-link">Xem tất cả</a>
                            </div>
                            <div class="notifications-list" id="navbar-notifications-list"></div>
                        </div>
                    </div>
                    <a href="/pages/support.html" class="topbar-link"><i class="fas fa-question-circle"></i> Hỗ Trợ</a>
                    <div class="topbar-user" id="topbar-user"></div>
                </div>
            </div>
        </div>
        <div class="shopee-main-nav">
            <div class="navbar-container">
                <a href="/" class="shopee-logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Vipo</span>
                </a>
                <div class="shopee-search">
                    <div class="search-box" style="position:relative;">
                        <input type="text" id="search-input" placeholder="Tìm sản phẩm, thương hiệu và tên shop" onkeypress="if(event.key==='Enter') searchProducts()" autocomplete="off">
                        <button class="search-btn" onclick="searchProducts()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="shopee-actions">
                    <a href="/pages/cart.html" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <!-- Breadcrumb -->
        <div class="breadcrumb" style="margin-bottom:1.5rem;">
            <a href="/">Trang chủ</a> / <a href="/pages/products.html">Sản phẩm</a> / <span id="bc-shop">Gian hàng</span>
        </div>

        <!-- Shop Header -->
        <div class="shop-hero" id="shop-header">
            <div class="spinner" style="margin: 2rem auto;"></div>
        </div>

        <!-- Vouchers Section -->
        <div id="shop-vouchers" style="margin-bottom: 2rem; display: none;">
            <h3 style="margin-bottom: 1rem; color: var(--primary-light); font-size: 1.2rem;"><i class="fas fa-ticket-alt"></i> Mã giảm giá của Shop</h3>
            <div id="voucher-list" style="display: flex; gap: 1rem; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 0.5rem; scrollbar-width: thin;">
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs" id="category-tabs">
            <button class="cat-tab active" data-id="" onclick="selectCategory('', this)">
                <i class="fas fa-th"></i> Tất cả
            </button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <span style="color:var(--dark-400);font-size:0.85rem;"><i class="fas fa-sort-amount-down"></i> Sắp xếp:</span>
            <select class="form-control" style="width:auto;min-width:170px;" id="filter-sort" onchange="loadProducts(1)">
                <option value="newest">Mới nhất</option>
                <option value="price_asc">Giá: Thấp → Cao</option>
                <option value="price_desc">Giá: Cao → Thấp</option>
                <option value="popular">Bán chạy</option>
                <option value="rating">Đánh giá cao</option>
            </select>
            <div style="margin-left:auto;color:var(--dark-400);font-size:0.85rem;" id="result-count">0 sản phẩm</div>
        </div>

        <div class="page-header">
            <h1 id="page-title">Sản phẩm của gian hàng</h1>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="products-grid">
            <div class="spinner" style="margin: 3rem auto;"></div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/products.js"></script>
    <script>
    const shopId = new URLSearchParams(location.search).get('id');
    let currentPage = 1;
    let selectedCategory = '';

    if (!shopId) location.href = '/pages/products.html';

    async function loadShop() {
        const r = await api.get(`/shops/${shopId}`);
        if (!r.success || !r.data) { location.href = '/pages/products.html'; return; }

        const shop = r.data;
        document.title = shop.ten_gian_hang + ' - Vipo';
        document.getElementById('bc-shop').textContent = shop.ten_gian_hang;
        document.getElementById('page-title').textContent = shop.ten_gian_hang;

        const verifiedBadge = shop.trang_thai === 'active'
            ? `<span class="verified-badge"><i class="fas fa-check-circle"></i> Đã xác thực</span>` : '';

        document.getElementById('shop-header').innerHTML = `
            <div style="display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;">
                <div class="shop-avatar">
                    ${shop.logo ? `<img src="${shop.logo}" alt="${shop.ten_gian_hang}" style="width:100%;height:100%;object-fit:cover;border-radius:16px;">` : '<i class="fas fa-store"></i>'}
                </div>
                <div style="flex:1;min-width:200px;">
                    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                        <h1 style="font-size:1.7rem;font-weight:800;">${shop.ten_gian_hang}</h1>
                        ${verifiedBadge}
                    </div>
                    <p style="color:var(--dark-400);margin-bottom:0.75rem;font-size:0.9rem;">${shop.mo_ta || 'Chưa có mô tả'}</p>
                    <div style="display:flex;gap:1rem;font-size:0.8rem;color:var(--dark-400);flex-wrap:wrap;">
                        ${shop.dia_chi ? `<span><i class="fas fa-map-marker-alt" style="color:var(--primary);"></i> ${shop.dia_chi}</span>` : ''}
                        <span><i class="fas fa-calendar" style="color:var(--primary);"></i> Tham gia ${new Date(shop.ngay_tao).toLocaleDateString('vi-VN')}</span>
                    </div>
                </div>
                <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;">
                    <div class="shop-stat">
                        <strong>${shop.so_san_pham || 0}</strong>
                        <span>Sản phẩm</span>
                    </div>
                    <div class="shop-stat">
                        <strong>${shop.diem_trung_binh ? parseFloat(shop.diem_trung_binh).toFixed(1) : '—'}</strong>
                        <span>Đánh giá</span>
                    </div>
                    <button class="btn btn-outline" onclick="location.href='/pages/chat.html?userId=${shop.nguoi_ban_id}&shopName=${encodeURIComponent(shop.ten_gian_hang)}'">
                        <i class="fas fa-comments"></i> Chat ngay
                    </button>
                </div>
            </div>
        `;

        loadCategories();
        loadShopPromotions();
        loadProducts();
    }

    async function loadShopPromotions() {
        const r = await api.get(`/promotions/shop/${shopId}`);
        if (!r.success || !r.data || r.data.length === 0) return;

        const voucherContainer = document.getElementById('shop-vouchers');
        const voucherList = document.getElementById('voucher-list');
        voucherContainer.style.display = 'block';

        voucherList.innerHTML = r.data.map(v => {
            const isPercent = v.loai === 'phan_tram';
            const isFreeship = v.loai === 'mien_phi_van_chuyen';
            const discountText = isPercent ? `Giảm ${v.gia_tri}%` : (isFreeship ? 'Miễn phí vận chuyển' : `Giảm ${formatPrice(v.gia_tri)}`);
            const iconClass = isFreeship ? 'fas fa-truck' : (isPercent ? 'fas fa-percent' : 'fas fa-tag');
            const remaining = (v.so_luong || 0) - (v.da_dung || 0);
            const pct = v.so_luong > 0 ? Math.round((v.da_dung / v.so_luong) * 100) : 0;
            const minOrderText = v.don_toi_thieu > 0 ? `Đơn từ ${formatPrice(v.don_toi_thieu)}` : 'Không giới hạn';
            return `
                <div style="min-width: 260px; max-width: 280px; background: linear-gradient(135deg, rgba(238,77,45,0.1) 0%, rgba(15,23,42,0.95) 100%); border: 1px dashed var(--primary); border-radius: 14px; overflow: hidden; flex-shrink:0; box-shadow: 0 4px 15px rgba(238,77,45,0.1);">
                    <div style="background: var(--gradient-primary); padding: 0.85rem 1rem; display:flex; align-items:center; gap:8px;">
                        <div style="width:32px;height:32px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                            <i class="${iconClass}" style="color:white;font-size:0.9rem;"></i>
                        </div>
                        <div style="font-weight:700;color:white;font-size:1rem;">${discountText}</div>
                    </div>
                    <div style="padding: 0.85rem 1rem;">
                        <div style="display:flex;align-items:center;gap:5px;margin-bottom:8px;">
                            <i class="fas fa-shopping-bag" style="color:var(--dark-400);font-size:0.75rem;"></i>
                            <span style="font-size:0.8rem;color:var(--dark-300);">${minOrderText}</span>
                        </div>
                        <div>
                            <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--dark-400);margin-bottom:3px;">
                                <span>Đã dùng: ${v.da_dung || 0}/${v.so_luong || 0}</span>
                                <span style="color:${remaining < 10 ? 'var(--danger)' : 'var(--success)'}">Còn ${remaining}</span>
                            </div>
                            <div style="height:4px;background:var(--dark-700);border-radius:10px;overflow:hidden;">
                                <div style="height:100%;width:${pct}%;background:var(--gradient-primary);border-radius:10px;"></div>
                            </div>
                        </div>
                    </div>
                    <div style="padding:0.6rem 1rem;border-top:1px dashed rgba(238,77,45,0.3);display:flex;justify-content:space-between;align-items:center;">
                        <span style="font-weight:700;color:var(--primary-light);letter-spacing:1px;font-size:0.9rem;">${v.ten_khuyen_mai}</span>
                        <button class="btn btn-primary" style="padding: 4px 12px; font-size: 0.78rem; border-radius: 20px;" onclick="saveVoucher(${v.id}, this)">
                            <i class="fas fa-bookmark"></i> Lưu
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function saveVoucher(id, btn) {
        if (!isLoggedIn()) {
            showToast('Vui lòng đăng nhập để lưu mã', 'warning');
            setTimeout(() => location.href = '/pages/login.html', 1500);
            return;
        }
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        const r = await api.post(`/promotions/save/${id}`);
        if (r.success) {
            btn.innerHTML = 'Đã lưu';
            btn.className = 'btn btn-outline';
            showToast(r.message);
        } else {
            btn.innerHTML = 'Lưu';
            btn.disabled = false;
            showToast(r.message, 'error');
        }
    }

    async function loadCategories() {
        const result = await api.get('/products/categories');
        if (!result.success) return;

        // Get categories that exist in this shop
        const r2 = await api.get(`/products/shop/${shopId}?limit=200`);
        const shopCats = new Set();
        if (r2.success) r2.data.forEach(p => { if (p.danh_muc_id) shopCats.add(p.danh_muc_id); });

        const tabs = document.getElementById('category-tabs');
        result.data.forEach(c => {
            if (!shopCats.has(c.id)) return;
            const btn = document.createElement('button');
            btn.className = 'cat-tab';
            btn.dataset.id = c.id;
            btn.innerHTML = c.ten_danh_muc;
            btn.onclick = () => selectCategory(c.id, btn);
            tabs.appendChild(btn);
        });
    }

    function selectCategory(id, btn) {
        selectedCategory = id;
        document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        loadProducts(1);
    }

    async function loadProducts(page = 1) {
        currentPage = page;
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '<div class="spinner" style="margin:3rem auto;grid-column:1/-1;"></div>';

        const query = {
            sort: document.getElementById('filter-sort').value,
            page: page,
            limit: 12
        };
        if (selectedCategory) query.danh_muc_id = selectedCategory;

        const qs = new URLSearchParams(query).toString();
        const result = await api.get(`/products/shop/${shopId}?${qs}`);

        if (!result.success) {
            grid.innerHTML = '<p style="text-align:center;color:var(--dark-400);grid-column:1/-1;padding:3rem;">Không thể tải sản phẩm</p>';
            return;
        }

        const products = result.data;
        document.getElementById('result-count').textContent = `${result.pagination.total} sản phẩm`;

        if (products.length > 0) {
            grid.innerHTML = products.map(p => {
                const hasDiscount = p.gia_khuyen_mai && p.gia_khuyen_mai < p.gia;
                const price = hasDiscount ? p.gia_khuyen_mai : p.gia;
                const discount = hasDiscount ? Math.round((1 - p.gia_khuyen_mai / p.gia) * 100) : 0;
                return `
                <div class="glass-card product-card" onclick="location.href='/pages/product-detail.html?id=${p.id}'">
                    ${hasDiscount ? `<div class="badge badge-sale">-${discount}%</div>` : ''}
                    <div class="image-wrapper">
                        <img src="${getProductImage(p.hinh_anh)}" alt="${p.ten_san_pham}" loading="lazy">
                    </div>
                    <div class="card-body">
                        <div class="product-name">${p.ten_san_pham}</div>
                        ${p.ten_danh_muc ? `<div style="font-size:0.75rem;color:var(--primary-light);margin-bottom:4px;"><i class="fas fa-tag"></i> ${p.ten_danh_muc}</div>` : ''}
                        <div class="price-row">
                            <span class="price">${formatPrice(price)}</span>
                            ${hasDiscount ? `<span class="original-price">${formatPrice(p.gia)}</span>` : ''}
                        </div>
                        <div class="rating">${renderStars(p.diem_trung_binh, p.so_danh_gia)}</div>
                    </div>
                    <div style="display:flex;gap:5px;padding:0 10px 10px;">
                        <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();addToCartQ(${p.id})" title="Thêm vào giỏ" style="flex:1;">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();buyNow(${p.id})" title="Mua ngay" style="flex:2;">
                            <i class="fas fa-bolt"></i> Mua ngay
                        </button>
                    </div>
                </div>`;
            }).join('');

            // Pagination
            renderPagination(result.pagination);
        } else {
            grid.innerHTML = '<p style="text-align:center;color:var(--dark-400);grid-column:1/-1;padding:3rem;"><i class="fas fa-box-open" style="font-size:3rem;display:block;margin-bottom:1rem;opacity:0.3;"></i>Gian hàng này chưa có sản phẩm trong danh mục này</p>';
            document.getElementById('pagination').innerHTML = '';
        }
    }

    function renderPagination(p) {
        const pg = document.getElementById('pagination');
        if (p.totalPages <= 1) { pg.innerHTML = ''; return; }
        let html = '';
        if (p.page > 1) html += `<button class="page-btn" onclick="loadProducts(${p.page-1})"><i class="fas fa-chevron-left"></i></button>`;
        for (let i = 1; i <= p.totalPages; i++) {
            html += `<button class="page-btn${i===p.page?' active':''}" onclick="loadProducts(${i})">${i}</button>`;
        }
        if (p.page < p.totalPages) html += `<button class="page-btn" onclick="loadProducts(${p.page+1})"><i class="fas fa-chevron-right"></i></button>`;
        pg.innerHTML = html;
    }

    async function addToCartQ(id) {
        if (!isLoggedIn()) { showToast('Vui lòng đăng nhập', 'warning'); return; }
        const r = await api.post('/cart', { san_pham_id: id, so_luong: 1 });
        if (r.success) { showToast('Đã thêm vào giỏ hàng!'); updateNavbarCartCount(); }
        else showToast(r.message, 'error');
    }

    async function buyNow(id) {
        if (!isLoggedIn()) { showToast('Vui lòng đăng nhập', 'warning'); location.href = '/pages/login.html'; return; }
        const r = await api.post('/cart', { san_pham_id: id, so_luong: 1 });
        if (r.success) { updateNavbarCartCount(); location.href = '/pages/checkout.html'; }
        else showToast(r.message, 'error');
    }

    function searchProducts() {
        const q = document.getElementById('search-input').value.trim();
        if (q) location.href = `/pages/products.html?search=${encodeURIComponent(q)}`;
    }

    document.addEventListener('DOMContentLoaded', () => { loadShop(); });
    </script>
    <script src="/js/shopee-nav.js"></script>
</body>
</html>
