<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .alert-badge {
            display:inline-flex; align-items:center; justify-content:center;
            background:#ef4444; color:white; border-radius:10px;
            padding:1px 7px; font-size:0.7rem; font-weight:700;
            margin-left:auto; min-width:20px;
        }
        .action-card {
            display:flex; align-items:center; gap:1rem; padding:1rem;
            border-bottom:1px solid var(--dark-700); cursor:pointer;
            transition:background 0.2s; border-radius:8px;
            text-decoration:none; color:inherit;
        }
        .action-card:hover { background:rgba(255,255,255,0.04); }
        .action-card .icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="navbar-container"><a href="/" class="navbar-brand"><i class="fas fa-shopping-bag"></i> Vipo</a><div class="navbar-actions" id="nav-actions"></div></div></nav>
    <div class="dashboard-layout" style="padding:90px 2rem 2rem;">
        <aside class="sidebar glass">
            <div style="text-align:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--dark-700);">
                <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#f59e0b);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:1.5rem;"><i class="fas fa-crown"></i></div>
                <h4 style="font-size:0.95rem;">Quản trị viên</h4>
            </div>
            <nav class="sidebar-menu">
                <a href="/pages/admin/dashboard.html" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/pages/admin/users.html"><i class="fas fa-users"></i> Người dùng <span class="alert-badge" id="badge-sellers" style="display:none;">0</span></a>
                <a href="/pages/admin/products.html"><i class="fas fa-box"></i> Sản phẩm <span class="alert-badge" id="badge-products" style="display:none;">0</span></a>
                <a href="/pages/admin/orders.html"><i class="fas fa-receipt"></i> Đơn hàng</a>
                <a href="/pages/admin/shops.html"><i class="fas fa-store"></i> Gian hàng</a>
                <a href="/pages/admin/complaints.html"><i class="fas fa-flag"></i> Khiếu nại <span class="alert-badge" id="badge-complaints" style="display:none;">0</span></a>
                <a href="/"><i class="fas fa-arrow-left"></i> Trang chủ</a>
            </nav>
        </aside>
        <main class="dashboard-content">
            <h1 style="margin-bottom:1.5rem;">🎯 Admin Dashboard</h1>
            <div class="stats-grid" id="stats"></div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-top:1.5rem;">
                <!-- Cần xử lý -->
                <div class="glass-card" style="padding:1.5rem;">
                    <h3 style="font-size:1rem;margin-bottom:1rem;"><i class="fas fa-bell" style="color:var(--warning);"></i> Cần xử lý ngay</h3>
                    <div id="action-list"></div>
                </div>
                <!-- Đơn hàng gần đây -->
                <div class="glass-card" style="padding:1.5rem;">
                    <h3 style="font-size:1rem;margin-bottom:1rem;">Đơn hàng gần đây</h3>
                    <div id="recent-orders"></div>
                </div>
            </div>

            <!-- Doanh thu -->
            <div class="glass-card" style="padding:1.5rem;margin-top:1.5rem;">
                <h3 style="font-size:1rem;margin-bottom:1rem;">📊 Doanh thu 6 tháng gần nhất</h3>
                <div id="revenue-chart"></div>
            </div>
        </main>
    </div>
    <script src="/js/api.js"></script>
    <script>
    if(!isLoggedIn() || getUser().vai_tro !== 'admin') location.href = '/pages/admin/login.html';

    async function load() {
        const [r, rPendingSellers, rPendingProducts] = await Promise.all([
            api.get('/admin/dashboard'),
            api.get('/admin/pending-sellers'),
            api.get('/admin/pending-products')
        ]);

        if(!r.success) return;
        const d = r.data;

        const pendingSellersCount = rPendingSellers.success ? rPendingSellers.data.length : 0;
        const pendingProductsCount = rPendingProducts.success ? rPendingProducts.data.length : 0;

        // Update sidebar badges
        const badgeSellers = document.getElementById('badge-sellers');
        const badgeProducts = document.getElementById('badge-products');
        const badgeComplaints = document.getElementById('badge-complaints');

        if (pendingSellersCount > 0) { badgeSellers.textContent = pendingSellersCount; badgeSellers.style.display = 'inline-flex'; }
        if (pendingProductsCount > 0) { badgeProducts.textContent = pendingProductsCount; badgeProducts.style.display = 'inline-flex'; }
        if (d.pendingComplaints > 0) { badgeComplaints.textContent = d.pendingComplaints; badgeComplaints.style.display = 'inline-flex'; }

        // Stats
        const userStats = {};
        (d.users||[]).forEach(u => userStats[u.vai_tro] = u.total);
        const totalOrders = (d.orders||[]).reduce((a,b)=>a+b.total,0);

        document.getElementById('stats').innerHTML = `
            <div class="stat-card glass-card"><div class="stat-icon" style="background:rgba(16,185,129,0.15);color:var(--success);"><i class="fas fa-dollar-sign"></i></div>
                <div class="stat-info"><h3>${formatPrice(d.revenue)}</h3><p>Tổng doanh thu</p></div></div>
            <div class="stat-card glass-card"><div class="stat-icon" style="background:rgba(99,102,241,0.15);color:var(--primary-light);"><i class="fas fa-users"></i></div>
                <div class="stat-info"><h3>${(userStats.customer||0)+(userStats.seller||0)}</h3><p>Người dùng</p></div></div>
            <div class="stat-card glass-card"><div class="stat-icon" style="background:rgba(245,158,11,0.15);color:var(--warning);"><i class="fas fa-store"></i></div>
                <div class="stat-info"><h3>${d.shops}</h3><p>Gian hàng</p></div></div>
            <div class="stat-card glass-card"><div class="stat-icon" style="background:rgba(139,92,246,0.15);color:var(--secondary);"><i class="fas fa-box"></i></div>
                <div class="stat-info"><h3>${d.products}</h3><p>Sản phẩm</p></div></div>
            <div class="stat-card glass-card"><div class="stat-icon" style="background:rgba(6,182,212,0.15);color:var(--accent);"><i class="fas fa-receipt"></i></div>
                <div class="stat-info"><h3>${totalOrders}</h3><p>Đơn hàng</p></div></div>
            <div class="stat-card glass-card" onclick="location.href='/pages/admin/complaints.html'" style="cursor:pointer;"><div class="stat-icon" style="background:rgba(239,68,68,0.15);color:var(--danger);"><i class="fas fa-flag"></i></div>
                <div class="stat-info"><h3>${d.pendingComplaints}</h3><p>Khiếu nại chờ</p></div></div>`;

        // Action list
        const actions = [];
        if (pendingSellersCount > 0) actions.push({ icon:'fa-user-clock', color:'rgba(245,158,11,0.2)', iconColor:'#fbbf24', title:`${pendingSellersCount} người bán chờ xác thực`, sub:'Duyệt tài khoản để cho phép đăng sản phẩm', href:'/pages/admin/users.html' });
        if (pendingProductsCount > 0) actions.push({ icon:'fa-box', color:'rgba(99,102,241,0.2)', iconColor:'var(--primary-light)', title:`${pendingProductsCount} sản phẩm chờ duyệt`, sub:'Xem xét và phê duyệt sản phẩm từ người bán', href:'/pages/admin/products.html' });
        if (d.pendingComplaints > 0) actions.push({ icon:'fa-flag', color:'rgba(239,68,68,0.2)', iconColor:'#f87171', title:`${d.pendingComplaints} khiếu nại chờ xử lý`, sub:'Giải quyết khiếu nại từ người dùng', href:'/pages/admin/complaints.html' });

        document.getElementById('action-list').innerHTML = actions.length > 0
            ? actions.map(a => `<a class="action-card" href="${a.href}">
                <div class="icon" style="background:${a.color};color:${a.iconColor};"><i class="fas ${a.icon}"></i></div>
                <div><div style="font-weight:600;font-size:0.9rem;">${a.title}</div><div style="font-size:0.8rem;color:var(--dark-400);">${a.sub}</div></div>
                <i class="fas fa-chevron-right" style="margin-left:auto;color:var(--dark-500);"></i>
            </a>`).join('')
            : `<div style="text-align:center;padding:2rem;color:var(--dark-400);">
                <i class="fas fa-check-circle" style="font-size:2rem;color:var(--success);opacity:0.5;display:block;margin-bottom:8px;"></i>
                Không có việc cần xử lý!
            </div>`;

        // Recent orders
        document.getElementById('recent-orders').innerHTML = (d.recentOrders||[]).slice(0,8).map(o => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--dark-700);font-size:0.8rem;">
                <span>#${o.id} <span style="color:var(--dark-300);">${o.ho_ten}</span></span>
                <span class="status ${getStatusClass(o.trang_thai)}" style="font-size:0.7rem;">${getStatusLabel(o.trang_thai)}</span>
                <span style="font-weight:600;color:var(--danger);">${formatPrice(o.tong_tien)}</span>
            </div>`).join('') || '<p style="color:var(--dark-500);text-align:center;padding:1rem;">Chưa có đơn hàng</p>';

        // Revenue chart
        document.getElementById('revenue-chart').innerHTML = (d.monthlyRevenue||[]).map(m => {
            const max = Math.max(...(d.monthlyRevenue||[]).map(x=>x.doanh_thu), 1);
            const pct = max > 0 ? (m.doanh_thu/max*100) : 0;
            return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                <span style="width:60px;font-size:0.75rem;color:var(--dark-300);">${m.thang}</span>
                <div style="flex:1;height:24px;background:var(--dark-700);border-radius:6px;overflow:hidden;">
                    <div style="height:100%;width:${pct}%;background:var(--gradient-primary);border-radius:6px;transition:width 1s;"></div>
                </div>
                <span style="font-size:0.75rem;width:110px;text-align:right;color:var(--success);">${formatPrice(m.doanh_thu)}</span>
                <span style="font-size:0.7rem;color:var(--dark-500);">${m.so_don} đơn</span>
            </div>`;
        }).join('') || '<p style="color:var(--dark-500);text-align:center;padding:1rem;">Chưa có doanh thu</p>';
    }

    load();
    </script>
</body>
</html>
