<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="shopee-navbar">
        <!-- Top Bar -->
        <div class="shopee-topbar">
            <div class="navbar-container">
                <div class="topbar-left">
                </div>
                <div class="topbar-right">
                    <div class="topbar-notifications">
                        <a href="#" class="topbar-link" id="notifications-btn" onclick="toggleNotifications()">
                            <i class="fas fa-bell"></i> Thông Báo
                            <span class="notification-badge" id="notification-count" style="display: none;">0</span>
                        </a>
                        <div class="notifications-dropdown" id="notifications-dropdown">
                            <div class="notifications-header">
                                <h4>Thông báo</h4>
                                <a href="/pages/profile.html#notifications" class="view-all-link">Xem tất cả</a>
                            </div>
                            <div class="notifications-list" id="navbar-notifications-list">
                                <!-- Notifications will be loaded here -->
                            </div>
                        </div>
                    </div>
                    <a href="#" class="topbar-link"><i class="fas fa-question-circle"></i> Hỗ Trợ</a>
                    <div class="topbar-user" id="topbar-user">
                        <!-- Sẽ được load động -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Navbar -->
        <div class="shopee-main-nav">
            <div class="navbar-container">
                <a href="/" class="shopee-logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Vipo</span>
                </a>
                
                <div class="shopee-search">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Tìm sản phẩm, thương hiệu và tên shop" onkeypress="if(event.key==='Enter') searchProducts()">
                        <button class="search-btn" onclick="searchProducts()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div class="shopee-actions">
                    <a href="/pages/cart.html" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header"><h1><i class="fas fa-credit-card"></i> Thanh toán</h1></div>
        <div style="display:grid;grid-template-columns:1fr 400px;gap:2rem;" id="checkout-layout">
            <div>
                <div class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem;">
                    <h3 style="margin-bottom:1rem;"><i class="fas fa-map-marker-alt" style="color:var(--danger)"></i> Địa chỉ nhận hàng</h3>
                    <div class="form-group"><label>Họ tên người nhận</label><input class="form-control" id="ten" value="" placeholder="Nhập họ tên..."></div>
                    <div class="form-group"><label>Số điện thoại</label><input class="form-control" id="sdt" placeholder="Nhập SĐT..."></div>
                    <div class="form-group"><label>Địa chỉ giao hàng</label><textarea class="form-control" id="diachi" placeholder="Nhập địa chỉ chi tiết..." rows="3"></textarea></div>
                    <div class="form-group"><label>Ghi chú</label><input class="form-control" id="ghichu" placeholder="Ghi chú cho người bán (tùy chọn)..."></div>
                </div>
                <div class="glass-card" style="padding:1.5rem;">
                    <h3 style="margin-bottom:1rem;"><i class="fas fa-wallet" style="color:var(--warning)"></i> Phương thức thanh toán</h3>
                    <div style="display:flex;flex-direction:column;gap:0.8rem;">
                        <label class="pay-opt" style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--dark-800);border:2px solid var(--primary);border-radius:12px;cursor:pointer;">
                            <input type="radio" name="payment" value="cod" checked style="accent-color:var(--primary)">
                            <i class="fas fa-money-bill-wave" style="color:var(--success);font-size:1.2rem;"></i>
                            <div><strong>Thanh toán khi nhận hàng (COD)</strong><br><small style="color:var(--dark-400)">Trả tiền mặt khi nhận hàng</small></div>
                        </label>
                        <label class="pay-opt" style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--dark-800);border:2px solid var(--dark-700);border-radius:12px;cursor:pointer;">
                            <input type="radio" name="payment" value="momo" style="accent-color:var(--primary)">
                            <i class="fas fa-wallet" style="color:#d82d8b;font-size:1.2rem;"></i>
                            <div><strong>Momo</strong><br><small style="color:var(--dark-400)">Thanh toán qua ví Momo</small></div>
                        </label>
                    </div>
                </div>
            </div>
            <div>
                <div class="glass-card" style="padding:1.5rem;position:sticky;top:90px;">
                    <h3 style="margin-bottom:1rem;">Đơn hàng của bạn</h3>
                    <div id="order-summary"><div class="spinner" style="margin:1rem auto;"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
    if(!isLoggedIn()) location.href='/pages/login.html';

    const user = getUser();
    if(user) {
        document.getElementById('ten').value = user.ho_ten || '';
        document.getElementById('sdt').value = user.so_dien_thoai || '';
        document.getElementById('diachi').value = user.dia_chi || '';
    }

    // Payment option highlight
    document.querySelectorAll('input[name="payment"]').forEach(r => {
        r.addEventListener('change', () => {
            document.querySelectorAll('.pay-opt').forEach(l => l.style.borderColor = 'var(--dark-700)');
            r.closest('.pay-opt').style.borderColor = 'var(--primary)';
        });
    });

    async function loadSummary() {
        const r = await api.get('/cart');
        const el = document.getElementById('order-summary');
        if(!r.success || r.data.length===0) { location.href='/pages/cart.html'; return; }

        let total = 0, html = '';
        r.data.forEach(shop => {
            shop.items.forEach(item => {
                const price = item.gia_khuyen_mai && item.gia_khuyen_mai < item.gia ? item.gia_khuyen_mai : item.gia;
                total += price * item.so_luong;
                html += `<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--dark-700);align-items:center;">
                    <img src="${getProductImage(item.hinh_anh)}" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">
                    <div style="flex:1;font-size:0.8rem;">
                        <div style="color:var(--white);font-weight:500;">${item.ten_san_pham}</div>
                        <div style="color:var(--dark-400);">x${item.so_luong}</div>
                    </div>
                    <div style="font-weight:600;font-size:0.85rem;">${formatPrice(price*item.so_luong)}</div>
                </div>`;
            });
        });

        html += `<div style="padding-top:1rem;margin-top:0.5rem;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.85rem;">
                <span style="color:var(--dark-400);">Tạm tính</span><span>${formatPrice(total)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.85rem;">
                <span style="color:var(--dark-400);">Phí giao hàng</span><span style="color:var(--success);">Miễn phí</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding-top:1rem;border-top:1px solid var(--dark-700);">
                <strong>Tổng cộng</strong>
                <strong style="font-family:'Outfit';font-size:1.3rem;color:var(--danger);">${formatPrice(total)}</strong>
            </div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:1.5rem;padding:14px;" onclick="placeOrder()" id="order-btn">
            <i class="fas fa-check-circle"></i> Đặt hàng
        </button>`;
        el.innerHTML = html;
    }

    async function placeOrder() {
        const diachi = document.getElementById('diachi').value.trim();
        const sdt = document.getElementById('sdt').value.trim();
        if(!diachi || !sdt) { showToast('Vui lòng nhập địa chỉ và SĐT','error'); return; }

        const btn = document.getElementById('order-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';

        const payment = document.querySelector('input[name="payment"]:checked').value;
        const r = await api.post('/orders', {
            dia_chi_giao: diachi,
            so_dien_thoai: sdt,
            phuong_thuc_thanh_toan: payment,
            ghi_chu: document.getElementById('ghichu').value
        });

        if(r.success) {
            showToast('Đặt hàng thành công!');
            if(payment === 'vnpay' || payment === 'momo') {
                // Redirect to payment gateway
                const orderId = r.data.orderIds[0];
                const cartR = await api.get('/cart'); // cart already cleared, use order
                const orderR = await api.get(`/orders/${orderId}`);
                if(orderR.success) {
                    const payR = await api.post(`/payment/${payment}/create`, {
                        order_id: orderId,
                        amount: orderR.data.tong_tien,
                        orderInfo: `Thanh toan don hang #${orderId}`
                    });
                    if(payR.success) { window.location.href = payR.data.paymentUrl; return; }
                }
            }
            setTimeout(() => location.href='/pages/orders.html', 1000);
        } else {
            showToast(r.message, 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Đặt hàng';
        }
    }

    loadSummary();
    </script>
    <script src="/js/checkout.js"></script>
        <script src="/js/seller-registration.js"></script>
<script src="/js/shopee-nav.js"></script>
</body>
</html>
