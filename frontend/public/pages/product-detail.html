<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Vipo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="shopee-navbar">
        <!-- Top Bar -->
        <div class="shopee-topbar">
            <div class="navbar-container">
                <div class="topbar-left">
                </div>
                <div class="topbar-right">
                    <div class="topbar-notifications">
                        <a href="#" class="topbar-link" id="notifications-btn" onclick="toggleNotifications()">
                            <i class="fas fa-bell"></i> Thông Báo
                            <span class="notification-badge" id="notification-count" style="display: none;">0</span>
                        </a>
                        <div class="notifications-dropdown" id="notifications-dropdown">
                            <div class="notifications-header">
                                <h4>Thông báo</h4>
                                <a href="/pages/profile.html#notifications" class="view-all-link">Xem tất cả</a>
                            </div>
                            <div class="notifications-list" id="navbar-notifications-list">
                                <!-- Notifications will be loaded here -->
                            </div>
                        </div>
                    </div>
                    <a href="#" class="topbar-link"><i class="fas fa-question-circle"></i> Hỗ Trợ</a>
                    <div class="topbar-user" id="topbar-user">
                        <!-- Sẽ được load động -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Navbar -->
        <div class="shopee-main-nav">
            <div class="navbar-container">
                <a href="/" class="shopee-logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Vipo</span>
                </a>
                
                <div class="shopee-search">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="Tìm sản phẩm, thương hiệu và tên shop" onkeypress="if(event.key==='Enter') searchProducts()">
                        <button class="search-btn" onclick="searchProducts()">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div class="shopee-actions">
                    <a href="/pages/cart.html" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="cart-badge" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-container" id="product-detail">
        <div class="breadcrumb" style="margin-bottom:1.5rem;"><a href="/">Trang chủ</a> / <a href="/pages/products.html">Sản phẩm</a> / <span id="bc-name"></span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem;" id="product-content">
            <div><div class="skeleton" style="padding-top:100%;border-radius:16px;"></div></div>
            <div><div class="skeleton" style="height:30px;margin-bottom:1rem;"></div></div>
        </div>

        <!-- Full-width Product Description Card -->
        <div class="glass-card" style="padding:2rem;margin-top:2rem;display:none;" id="desc-card">
            <h3 style="font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;border-bottom:1px solid var(--dark-700);padding-bottom:0.75rem;">
                <i class="fas fa-file-alt" style="color:var(--primary-light);margin-right:8px;"></i> Mô tả chi tiết sản phẩm
            </h3>
            <div id="desc-content" style="font-size:0.95rem;color:var(--dark-200);line-height:1.8;margin:0;"></div>
        </div>

        <div style="margin-top:2rem;" id="reviews-section"></div>
    </div>

    <script src="/js/api.js"></script>
    <script>
    const pid = new URLSearchParams(location.search).get('id');
    let product = null;

    async function load() {
        if (!pid) { location.href='/pages/products.html'; return; }
        const r = await api.get(`/products/${pid}`);
        if (!r.success) { location.href='/pages/products.html'; return; }
        product = r.data;
        document.title = product.ten_san_pham + ' - Vipo';
        document.getElementById('bc-name').textContent = product.ten_san_pham;

        const hd = product.gia_khuyen_mai && product.gia_khuyen_mai < product.gia;
        const price = hd ? product.gia_khuyen_mai : product.gia;

        document.getElementById('product-content').innerHTML = `
        <div>
            <div class="glass" style="border-radius:20px;overflow:hidden;position:relative;">
                ${hd ? `<div class="badge badge-sale" style="position:absolute;top:16px;left:16px;z-index:2;padding:6px 14px;font-size:0.85rem;">-${Math.round((1-product.gia_khuyen_mai/product.gia)*100)}%</div>` : ''}
                <img src="${getProductImage(product.hinh_anh)}" alt="${product.ten_san_pham}" style="width:100%;display:block;">
            </div>
        </div>
        <div>
            <div class="glass-card" style="padding:2rem;">
                <div style="font-size:0.85rem;color:var(--primary-light);margin-bottom:8px;">${product.ten_danh_muc||'Chưa phân loại'}</div>
                <h1 style="font-size:1.6rem;font-weight:700;margin-bottom:1rem;">${product.ten_san_pham}</h1>
                <div style="display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;">
                    <div class="rating" style="font-size:1rem;">${renderStars(product.diem_trung_binh, product.so_danh_gia)}</div>
                    <span style="color:var(--dark-500);font-size:0.85rem;"><i class="fas fa-eye"></i> ${product.luot_xem}</span>
                </div>
                <div style="padding:1.2rem;background:var(--dark-900);border-radius:12px;margin-bottom:1.5rem;">
                    <span style="font-family:'Outfit';font-size:2rem;font-weight:800;color:var(--danger);">${formatPrice(price)}</span>
                    ${hd ? `<span style="font-size:1rem;color:var(--dark-500);text-decoration:line-through;margin-left:12px;">${formatPrice(product.gia)}</span>` : ''}
                </div>
                <div style="margin-bottom:1.5rem;font-size:0.85rem;">Còn lại: <strong style="color:${product.so_luong_ton>0?'var(--success)':'var(--danger)'}">${product.so_luong_ton>0?product.so_luong_ton+' sp':'Hết hàng'}</strong></div>
                <div style="display:flex;align-items:center;gap:16px;margin-bottom:1.5rem;">
                    <span style="font-size:0.95rem;font-weight:500;color:var(--dark-300);">Số lượng:</span>
                    <div style="display:flex;align-items:center;background:var(--dark-900);border:1px solid var(--dark-700);border-radius:24px;padding:4px;box-shadow:inset 0 1px 3px rgba(0,0,0,0.02);">
                        <button onclick="chgQty(-1)" style="width:34px;height:34px;border-radius:50%;background:white;border:1px solid var(--dark-700);color:var(--dark-200);cursor:pointer;font-weight:bold;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.05);transition:all 0.2s;" onmouseover="this.style.transform='scale(1.05)';this.style.color='var(--primary)'" onmouseout="this.style.transform='scale(1)';this.style.color='var(--dark-200)'">-</button>
                        
                        <style>
                            input[type=number]::-webkit-inner-spin-button, 
                            input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
                            input[type=number] { -moz-appearance: textfield; appearance: none; }
                        </style>
                        <input type="number" id="qty" value="1" min="1" max="${product.so_luong_ton}" style="width:50px;text-align:center;background:transparent;border:none;color:var(--dark-100);font-weight:700;font-size:1.1rem;outline:none;">
                        
                        <button onclick="chgQty(1)" style="width:34px;height:34px;border-radius:50%;background:white;border:1px solid var(--dark-700);color:var(--dark-200);cursor:pointer;font-weight:bold;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(0,0,0,0.05);transition:all 0.2s;" onmouseover="this.style.transform='scale(1.05)';this.style.color='var(--primary)'" onmouseout="this.style.transform='scale(1)';this.style.color='var(--dark-200)'">+</button>
                    </div>
                </div>
                <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                    <button class="btn btn-outline btn-lg" style="flex:1;min-width:140px;" onclick="addCart()" ${product.so_luong_ton<=0?'disabled':''}>
                        <i class="fas fa-cart-plus"></i> Thêm vào giỏ
                    </button>
                    <button class="btn btn-primary btn-lg" style="flex:2;min-width:140px;" onclick="buyNow()" ${product.so_luong_ton<=0?'disabled':''}>
                        <i class="fas fa-bolt"></i> Mua ngay
                    </button>
                </div>
                <button class="btn btn-outline btn-sm" style="width:100%;margin-top:0.5rem;" onclick="location.href='/pages/chat.html?userId=${product.nguoi_ban_id}&shopName=${encodeURIComponent(product.ten_gian_hang)}'">
                    <i class="fas fa-comments"></i> Chat với người bán
                </button>
            </div>
            <div class="glass-card" style="padding:1.2rem;margin-top:1rem;display:flex;align-items:center;gap:1rem;">
                <div style="width:50px;height:50px;border-radius:50%;background:var(--dark-700);display:flex;align-items:center;justify-content:center;">
                    <i class="fas fa-store" style="color:var(--primary-light);"></i>
                </div>
                <div style="flex:1;"><h4 style="font-size:0.95rem;cursor:pointer;" onclick="location.href='/pages/shop.html?id=${product.shop_id}'">${product.ten_gian_hang}</h4></div>
                <button class="btn btn-outline btn-sm" onclick="location.href='/pages/shop.html?id=${product.shop_id}'">
                    <i class="fas fa-eye"></i> Xem shop
                </button>
            </div>
        </div>`;

        if (product.mo_ta) {
            document.getElementById('desc-content').innerHTML = product.mo_ta;
            document.getElementById('desc-card').style.display = 'block';
        } else {
            document.getElementById('desc-card').style.display = 'none';
        }
        loadReviews();
    }

    function chgQty(d) {
        const i = document.getElementById('qty');
        let v = parseInt(i.value) || 1;
        v += d;
        i.value = Math.max(1, Math.min(v, product.so_luong_ton || 999));
    }

    async function addCart() {
        if(!isLoggedIn()){showToast('Vui lòng đăng nhập','warning');return;}
        const r=await api.post('/cart',{san_pham_id:pid,so_luong:parseInt(document.getElementById('qty').value)});
        if(r.success){showToast('Đã thêm vào giỏ!');updateNavbarCartCount();}else showToast(r.message,'error');
    }

    async function buyNow() {
        if(!isLoggedIn()){showToast('Vui lòng đăng nhập','warning');location.href='/pages/login.html';return;}
        const r=await api.post('/cart',{san_pham_id:pid,so_luong:parseInt(document.getElementById('qty').value)});
        if(r.success){updateNavbarCartCount();location.href='/pages/checkout.html';}
        else showToast(r.message,'error');
    }


    async function loadReviews() {
        const r = await api.get(`/reviews/product/${pid}`);
        if(!r.success) return;
        const {reviews,stats}=r.data;
        document.getElementById('reviews-section').innerHTML = `
        <div class="glass-card" style="padding:2rem;">
            <h2 style="font-size:1.4rem;margin-bottom:1.5rem;"><i class="fas fa-star" style="color:var(--warning)"></i> Đánh giá (${stats.tong||0})</h2>
            <div style="text-align:center;margin-bottom:1.5rem;">
                <div style="font-family:'Outfit';font-size:3rem;font-weight:800;color:var(--warning);">${(stats.trung_binh||0).toFixed(1)}</div>
                <div class="rating" style="justify-content:center;">${renderStars(stats.trung_binh,stats.tong)}</div>
            </div>
            <div>${reviews.length>0?reviews.map(rv=>`
                <div style="padding:1rem 0;border-top:1px solid var(--dark-700);display:flex;gap:10px;">
                    <div style="width:36px;height:36px;border-radius:50%;background:var(--dark-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="fas fa-user" style="font-size:0.8rem;color:var(--dark-400);"></i>
                    </div>
                    <div>
                        <strong style="font-size:0.85rem;">${rv.ho_ten}</strong>
                        <div class="rating" style="font-size:0.75rem;">${renderStars(rv.so_sao,0).replace(/<span>[^<]*<\/span>/,'')}</div>
                        <p style="font-size:0.85rem;color:var(--dark-300);margin-top:4px;">${rv.binh_luan||''}</p>
                        <span style="font-size:0.7rem;color:var(--dark-500);">${formatDate(rv.ngay_tao)}</span>
                    </div>
                </div>`).join(''):'<p style="text-align:center;color:var(--dark-500);padding:2rem;">Chưa có đánh giá</p>'}</div>
        </div>`;
    }

    load();
</script>
<script src="/js/seller-registration.js"></script>
<script src="/js/shopee-nav.js"></script>
</body>
</html>
